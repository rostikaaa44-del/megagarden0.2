<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌱 Сад-Кликер</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;user-select:none}
        body{background:#0f1f0f;min-height:100vh;display:flex;justify-content:center;align-items:center;font-family:'Segoe UI',sans-serif;padding:8px}
        .game{background:#2d5a2d;border-radius:30px;padding:12px;max-width:420px;width:100%;border:3px solid #4d8a4d;box-shadow:0 20px 40px rgba(0,0,0,.7);display:flex;flex-direction:column;min-height:580px}
        .back-btn{background:#7a3a3a;color:#fff;border:none;padding:6px;border-radius:12px;font-size:10px;font-weight:700;cursor:pointer;margin-bottom:4px;border:2px solid #aa5a5a;width:100%}
        .back-btn:active{transform:scale(.95)}
        .stats{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:4px;background:#1f3f1f;padding:6px 10px;border-radius:16px;margin-bottom:6px;border:2px solid #4d7a4d}
        .stat-item{color:#e8f5d0;font-weight:700;font-size:8px;text-align:center}
        .stat-item span{color:#ffd700;font-size:13px;display:block}
        .click-area{display:flex;flex-direction:column;align-items:center;padding:10px 0}
        .click-btn{width:150px;height:150px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#6ab04a,#1f4a1f);display:flex;flex-direction:column;justify-content:center;align-items:center;cursor:pointer;border:4px solid #8fc98f;box-shadow:0 8px 0 #0f2a0f,0 15px 40px rgba(0,0,0,.5);transition:all .08s;position:relative}
        .click-btn:active{transform:translateY(6px);box-shadow:0 2px 0 #0f2a0f,0 8px 20px rgba(0,0,0,.5)}
        .click-emoji{font-size:52px;line-height:1;filter:drop-shadow(0 4px 8px rgba(0,0,0,.3));transition:all .1s}
        .click-btn:active .click-emoji{transform:scale(.8)}
        .click-hint{color:#d4ecd4;font-size:10px;margin-top:2px;font-weight:700;text-shadow:0 2px 8px rgba(0,0,0,.5);background:rgba(0,0,0,.2);padding:2px 12px;border-radius:20px}
        .combo-display{color:#ffd700;font-size:12px;font-weight:700;margin-top:4px;min-height:18px}
        .click-area .progress-bar{width:80%;max-width:250px;height:6px;background:#2a4a2a;border-radius:4px;overflow:hidden;margin-top:6px}
        .click-area .progress-bar .fill{height:100%;background:linear-gradient(90deg,#6fcf6f,#ffd700);border-radius:4px;transition:width .3s}
        .shop-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin:6px 0;max-height:140px;overflow-y:auto;padding:4px;background:rgba(0,0,0,.2);border-radius:12px;border:1px solid rgba(255,255,255,.1)}
        .shop-grid::-webkit-scrollbar{width:4px}
        .shop-grid::-webkit-scrollbar-track{background:rgba(0,0,0,.3);border-radius:4px}
        .shop-grid::-webkit-scrollbar-thumb{background:#4d8a4d;border-radius:4px}
        .shop-btn{background:rgba(0,0,0,.3);color:#e8f5d0;border:2px solid rgba(255,255,255,.1);padding:4px 2px;border-radius:10px;font-weight:700;font-size:7px;cursor:pointer;transition:all .12s;text-align:center;line-height:1.1}
        .shop-btn:active{transform:scale(.95);background:rgba(0,0,0,.4)}
        .shop-btn.disabled{opacity:.4;filter:grayscale(.7);pointer-events:none}
        .shop-btn .price{color:#ffd700;display:block;font-size:6px}
        .shop-btn .owned{color:#8aaa6a;display:block;font-size:6px}
        .shop-btn .bonus{color:#6fcfcf;display:block;font-size:6px}
        .shop-btn.bought{border-color:#ffd700;background:rgba(255,215,0,.1)}
        .actions-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin:4px 0}
        .action-btn{background:rgba(0,0,0,.3);color:#e8f5d0;border:none;padding:6px 0;border-radius:12px;font-weight:700;font-size:7px;cursor:pointer;border:2px solid rgba(255,255,255,.1);transition:all .12s}
        .action-btn:active{transform:scale(.95);background:rgba(0,0,0,.4)}
        .action-btn.gold{background:rgba(255,215,0,.2);border-color:#ffd700;color:#ffd700}
        .action-btn.blue{background:rgba(74,106,154,.3);border-color:#4a6a9a;color:#f0f7ff}
        .action-btn.red{background:rgba(122,58,58,.3);border-color:#7a3a3a;color:#f0d0d0}
        .action-btn.purple{background:rgba(154,106,202,.3);border-color:#9a6aca;color:#f0d0ff}
        .footer{color:#8aaa8a;text-align:center;font-size:7px;margin-top:4px}
        .footer.error{color:#ff6b6b}
        .footer.success{color:#6fcf6f}
        .click-float{position:fixed;font-weight:700;font-size:28px;color:#ffd700;text-shadow:0 0 20px #ffa500,0 0 40px #ff6600;pointer-events:none;animation:floatUp 1s ease-out forwards;z-index:999}
        @keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-120px) scale(1.5)}}
        .toast{position:fixed;top:10px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);color:#ffd700;padding:6px 16px;border-radius:16px;font-size:12px;font-weight:700;z-index:999;border:2px solid #ffd700;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
        .toast.show{opacity:1}
        .toast.error{border-color:#ff6b6b;color:#ff6b6b}
        .boost-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:2000;display:none;flex-direction:column;justify-content:center;align-items:center;padding:20px}
        .boost-overlay.active{display:flex}
        .boost-box{background:#2d5a2d;border-radius:20px;padding:20px;max-width:360px;width:100%;border:3px solid #ffd700;text-align:center}
        .boost-box h2{color:#ffd700;font-size:18px;margin-bottom:12px}
        .boost-box .boost-btn{background:#1f4a1f;color:#e8f5d0;border:2px solid #4d8a4d;padding:12px;border-radius:12px;margin:6px 0;font-size:12px;font-weight:700;cursor:pointer;transition:all .12s;width:100%}
        .boost-box .boost-btn:active{transform:scale(.95);background:#123012}
        .boost-box .boost-btn.gold{border-color:#ffd700;color:#ffd700}
        .boost-box .boost-btn.purple{border-color:#9a6aca;color:#f0d0ff}
        .boost-box .boost-btn.disabled{opacity:.4;pointer-events:none}
        .boost-box .close-btn{background:#7a3a3a;color:#fff;border:none;padding:8px;border-radius:12px;font-size:12px;font-weight:700;cursor:pointer;margin-top:8px;width:100%;border:2px solid #aa5a5a}
        .boost-box .close-btn:active{transform:scale(.95)}
        .boost-status{color:#6fcf6f;font-size:10px;margin:4px 0}
    </style>
</head>
<body>
    <div class="toast" id="toast">✅ Готово!</div>

    <div class="boost-overlay" id="boostOverlay">
        <div class="boost-box">
            <h2>⚡ БУСТЫ</h2>
            <div class="boost-status" id="boostStatus">Выбери буст для активации</div>
            <button class="boost-btn gold" id="boostClick">🚀 x3 доход на 2 минуты<br><span style="font-size:10px;color:#8aaa8a;">3000💰</span></button>
            <button class="boost-btn purple" id="boostMiniGames">🎮 x2 доход с мини-игр на 2 минуты<br><span style="font-size:10px;color:#8aaa8a;">3000💰</span></button>
            <button class="close-btn" id="closeBoostBtn">🚪 Закрыть</button>
        </div>
    </div>

    <div class="game">
        <button class="back-btn" onclick="location.href='index.html'">🏠 На главную</button>
        <div class="stats">
            <div class="stat-item">💰 <span id="money">0</span></div>
            <div class="stat-item">🌱 <span id="seeds">0</span></div>
            <div class="stat-item">⚡ <span id="cps">0</span></div>
            <div class="stat-item">👤 <span id="userName">Гость</span></div>
        </div>
        <div class="click-area">
            <div class="click-btn" id="clickBtn">
                <div class="click-emoji">🧑‍🌾</div>
                <div class="click-hint">👆 Тапай!</div>
            </div>
            <div class="combo-display" id="comboDisplay">🔥 Комбо: x1</div>
            <div class="progress-bar"><div class="fill" id="gardenProgress" style="width:0%"></div></div>
        </div>
        <div class="shop-grid" id="shopContainer"></div>
        <div class="actions-row">
            <button class="action-btn gold" id="prestigeBtn">✨ Перерождение</button>
            <button class="action-btn blue" id="autoClickBtn">🤖 Автокликер</button>
            <button class="action-btn purple" id="boostBtn">⚡ Бусты</button>
        </div>
        <div class="footer" id="statusMsg">🌱 Сажай семена и собирай урожай!</div>
    </div>
    <script src="data.js"></script>
    <script>
        let currentUser = null;
        let state = {
            money: 0,
            seeds: 0,
            prestigeLevel: 0,
            prestigeBonus: 1,
            autoClickers: 0,
            autoClickLevel: 1,
            totalClicks: 0,
            totalMoneyEarned: 0,
            achievements: [],
            seedInventory: {},
            clickBonus: 0,
            clickMultiplier: 1,
            boostClickMultiplier: 1,
            boostMiniGames: 1,
            boostClickEnd: 0,
            boostMiniGamesEnd: 0,
        };

        let comboCount = 0;
        let comboTimer = null;
        let lastClickTime = 0;

        const SEED_NAMES = ['Помидор', 'Огурец', 'Морковь', 'Картофель', 'Лук', 'Чеснок', 'Капуста', 'Свекла',
            'Репа', 'Редис', 'Тыква', 'Кабачок', 'Баклажан', 'Перец', 'Горох', 'Фасоль',
            'Кукуруза', 'Пшеница', 'Рожь', 'Овес', 'Гречиха', 'Рис', 'Ячмень', 'Просо',
            'Подсолнух', 'Клубника', 'Малина', 'Смородина', 'Крыжовник', 'Ежевика', 'Голубика', 'Брусника'
        ];
        const SEED_EMOJIS = ['🍅', '🥒', '🥕', '🥔', '🧅', '🧄', '🥬', '🌿', '🌻', '🍓', '🍉', '🍇', '🍊', '🍑', '🥭', '🍍'];

        function generateSeeds() {
            const seeds = [];
            for (let i = 0; i < 32; i++) {
                const tier = Math.floor(i / 8) + 1;
                seeds.push({
                    id: i,
                    name: SEED_NAMES[i % SEED_NAMES.length],
                    emoji: SEED_EMOJIS[i % SEED_EMOJIS.length],
                    basePrice: Math.floor(5 + i * 2.5),
                    bonus: Math.min(0.05 + (tier - 1) * 0.05, 0.2),
                    tier: tier
                });
            }
            return seeds;
        }
        let ALL_SEEDS = generateSeeds();

        function getSeedPrice(id) {
            const seed = ALL_SEEDS[id];
            if (!seed) return 999;
            const owned = state.seedInventory[id] || 0;
            return Math.floor(seed.basePrice * Math.pow(3, owned));
        }

        function loadUser() {
            const user = getCurrentUser();
            if (!user) {
                document.getElementById('userName').textContent = 'Гость';
                document.getElementById('statusMsg').textContent = '⚠️ Войди в аккаунт через профиль!';
                document.getElementById('statusMsg').className = 'footer error';
                return false;
            }
            currentUser = user;
            document.getElementById('userName').textContent = user;
            const userState = getUserState(user);
            if (userState) {
                state = { ...state, ...userState };
            }
            ALL_SEEDS = generateSeeds();
            updateUI();
            document.getElementById('statusMsg').textContent = '🌱 Добро пожаловать!';
            document.getElementById('statusMsg').className = 'footer';
            checkBoostTimers();
            return true;
        }

        function saveState() {
            if (currentUser) {
                saveUserState(currentUser, state);
            }
        }

        function checkBoostTimers() {
            const now = Date.now();
            if (state.boostClickEnd && state.boostClickEnd < now) {
                state.boostClickMultiplier = 1;
                state.boostClickEnd = 0;
            }
            if (state.boostMiniGamesEnd && state.boostMiniGamesEnd < now) {
                state.boostMiniGames = 1;
                state.boostMiniGamesEnd = 0;
            }
        }

        function showToast(msg, isError = false) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.className = 'toast' + (isError ? ' error' : '');
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 2500);
        }

        function showFloatingText(x, y, text, isGold = false) {
            const el = document.createElement('div');
            el.className = 'click-float';
            el.textContent = text;
            if (isGold) {
                el.style.color = '#ff6b6b';
                el.style.textShadow = '0 0 20px #ff6b6b, 0 0 40px #ff4444';
            }
            el.style.left = (x - 30) + 'px';
            el.style.top = (y - 20) + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1000);
        }

        function updateUI() {
            document.getElementById('money').textContent = Math.floor(state.money || 0);
            document.getElementById('seeds').textContent = state.seeds || 0;
            const cps = (state.autoClickers || 0) * 0.5 * (state.autoClickLevel || 1) * (state.prestigeBonus || 1) * (state.boostClickMultiplier || 1);
            document.getElementById('cps').textContent = cps.toFixed(1);

            // Прогресс сада
            const totalSeeds = Object.values(state.seedInventory).reduce((a, b) => a + b, 0);
            const progress = Math.min(100, totalSeeds * 2);
            document.getElementById('gardenProgress').style.width = progress + '%';

            renderShop();
            saveState();
        }

        function renderShop() {
            const container = document.getElementById('shopContainer');
            container.innerHTML = '';
            ALL_SEEDS.forEach(seed => {
                const price = getSeedPrice(seed.id);
                const owned = state.seedInventory[seed.id] || 0;
                const btn = document.createElement('button');
                btn.className = 'shop-btn' + (state.money < price ? ' disabled' : '');
                btn.innerHTML = `${seed.emoji} ${seed.name}
                    <span class="price">💰 ${price}</span>
                    <span class="bonus">+${seed.bonus}💰</span>
                    <span class="owned">${owned} шт.</span>`;
                btn.onclick = () => buySeed(seed.id);
                container.appendChild(btn);
            });
        }

        function buySeed(id) {
            const seed = ALL_SEEDS[id];
            if (!seed) return;
            const price = getSeedPrice(id);
            if (state.money < price) {
                showToast('⚠️ Не хватает денег!', true);
                return;
            }
            state.money -= price;
            state.seedInventory[id] = (state.seedInventory[id] || 0) + 1;
            state.seeds++;
            state.clickBonus += seed.bonus;
            playSound('buy');
            const newAch = checkAchievements(state);
            if (newAch.length > 0) {
                newAch.forEach(a => showToast(`🏆 ${a.name}!`, false));
            }
            updateUI();
            showFloatingText(window.innerWidth / 2, window.innerHeight / 2, `🌱 Куплен ${seed.name}`);
        }

        function clickHandler(e) {
            if (!currentUser) {
                showToast('⚠️ Войди в аккаунт!', true);
                return;
            }

            const now = Date.now();
            if (now - lastClickTime < 500) {
                comboCount = Math.min(10, comboCount + 1);
            } else {
                comboCount = 1;
            }
            lastClickTime = now;
            const comboMultiplier = 1 + (comboCount - 1) * 0.1;
            document.getElementById('comboDisplay').textContent = `🔥 Комбо: x${comboMultiplier.toFixed(1)}`;

            if (comboTimer) clearTimeout(comboTimer);
            comboTimer = setTimeout(() => {
                comboCount = 0;
                document.getElementById('comboDisplay').textContent = '🔥 Комбо: x1';
            }, 800);

            const baseGain = (0.5 + (state.clickBonus || 0)) * (state.prestigeBonus || 1) * (state.clickMultiplier || 1) * (state.boostClickMultiplier || 1);
            const gain = baseGain * comboMultiplier;

            // Золотой клик (шанс 2%)
            const isGold = Math.random() < 0.02;
            const finalGain = isGold ? gain * 10 : gain;

            state.money += finalGain;
            state.totalClicks++;
            state.totalMoneyEarned += finalGain;

            const x = e.clientX || window.innerWidth / 2;
            const y = e.clientY || window.innerHeight / 2;
            showFloatingText(x, y, `+${finalGain.toFixed(1)}💰`, isGold);

            if (isGold) {
                playSound('achievement');
                showToast('✨ ЗОЛОТОЙ КЛИК! x10!', false);
            } else {
                playSound('click');
            }

            const newAch = checkAchievements(state);
            if (newAch.length > 0) {
                newAch.forEach(a => showToast(`🏆 ${a.name}!`, false));
            }
            updateUI();
        }

        document.getElementById('clickBtn').addEventListener('click', clickHandler);
        document.getElementById('clickBtn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            clickHandler(e.touches[0]);
        });

        document.getElementById('autoClickBtn').addEventListener('click', () => {
            if (!currentUser) { showToast('⚠️ Войди в аккаунт!', true); return; }
            const price = Math.floor(30 * Math.pow(1.5, state.autoClickers || 0));
            if (state.money < price) {
                showToast('⚠️ Не хватает денег для автокликера!', true);
                return;
            }
            state.money -= price;
            state.autoClickers = (state.autoClickers || 0) + 1;
            playSound('buy');
            updateUI();
            showToast(`🤖 Автокликер куплен! (+${state.autoClickers} шт.)`, false);
        });

        document.getElementById('prestigeBtn').addEventListener('click', () => {
            if (!currentUser) { showToast('⚠️ Войди в аккаунт!', true); return; }
            const required = 500 * Math.pow(2, state.prestigeLevel || 0);
            if (state.totalMoneyEarned < required) {
                showToast(`⚠️ Нужно заработать ${required}💰`, true);
                return;
            }
            if (!confirm('Переродиться? Бонус +0.5x')) return;
            state.prestigeLevel = (state.prestigeLevel || 0) + 1;
            state.prestigeBonus = 1 + (state.prestigeLevel * 0.5);
            state.seedInventory = {};
            state.seeds = 0;
            state.autoClickers = 0;
            state.autoClickLevel = 1;
            state.clickBonus = 0;
            state.clickMultiplier = 1 + state.prestigeLevel * 0.1;
            state.boostClickMultiplier = 1;
            state.boostMiniGames = 1;
            state.boostClickEnd = 0;
            state.boostMiniGamesEnd = 0;
            playSound('prestige');
            updateUI();
            showToast(`✨ Перерождение! Бонус: x${state.prestigeBonus.toFixed(1)}`, false);
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            if (!currentUser) { showToast('⚠️ Войди в аккаунт!', true); return; }
            if (!confirm('Сбросить прогресс?')) return;
            state = {
                money: 0,
                seeds: 0,
                prestigeLevel: 0,
                prestigeBonus: 1,
                autoClickers: 0,
                autoClickLevel: 1,
                totalClicks: 0,
                totalMoneyEarned: 0,
                achievements: [],
                seedInventory: {},
                clickBonus: 0,
                clickMultiplier: 1,
                boostClickMultiplier: 1,
                boostMiniGames: 1,
                boostClickEnd: 0,
                boostMiniGamesEnd: 0,
            };
            ALL_SEEDS = generateSeeds();
            updateUI();
            showToast('🔄 Прогресс сброшен!', true);
        });

        // Бусты
        document.getElementById('boostBtn').addEventListener('click', () => {
            if (!currentUser) { showToast('⚠️ Войди в аккаунт!', true); return; }
            document.getElementById('boostOverlay').classList.add('active');
            updateBoostUI();
        });

        document.getElementById('closeBoostBtn').addEventListener('click', () => {
            document.getElementById('boostOverlay').classList.remove('active');
        });

        function updateBoostUI() {
            const now = Date.now();
            const clickActive = state.boostClickEnd && state.boostClickEnd > now;
            const miniActive = state.boostMiniGamesEnd && state.boostMiniGamesEnd > now;
            document.getElementById('boostStatus').textContent =
                `${clickActive ? '✅ x3 активен! ' : ''}${miniActive ? '✅ x2 мини-игры активен! ' : ''}${!clickActive && !miniActive ? 'Выбери буст' : ''}`;
            document.getElementById('boostClick').className = 'boost-btn gold' + (clickActive ? ' disabled' : '');
            document.getElementById('boostClick').innerHTML =
                `🚀 x3 доход на 2 минуты${clickActive ? ' ✅' : ''}<br><span style="font-size:10px;color:#8aaa8a;">3000💰</span>`;
            document.getElementById('boostMiniGames').className = 'boost-btn purple' + (miniActive ? ' disabled' : '');
            document.getElementById('boostMiniGames').innerHTML =
                `🎮 x2 доход с мини-игр на 2 минуты${miniActive ? ' ✅' : ''}<br><span style="font-size:10px;color:#8aaa8a;">3000💰</span>`;
        }

        document.getElementById('boostClick').addEventListener('click', () => {
            if (state.boostClickEnd && state.boostClickEnd > Date.now()) {
                showToast('⚠️ Буст уже активен!', true);
                return;
            }
            if (state.money < 3000) {
                showToast('⚠️ Нужно 3000💰!', true);
                return;
            }
            state.money -= 3000;
            state.boostClickMultiplier = 3;
            state.boostClickEnd = Date.now() + 120000;
            playSound('buy');
            showToast('🚀 x3 доход активирован на 2 минуты!', false);
            updateUI();
            updateBoostUI();
            setTimeout(() => {
                state.boostClickMultiplier = 1;
                state.boostClickEnd = 0;
                updateUI();
                showToast('⏱️ Буст x3 закончился', false);
            }, 120000);
        });

        document.getElementById('boostMiniGames').addEventListener('click', () => {
            if (state.boostMiniGamesEnd && state.boostMiniGamesEnd > Date.now()) {
                showToast('⚠️ Буст уже активен!', true);
                return;
            }
            if (state.money < 3000) {
                showToast('⚠️ Нужно 3000💰!', true);
                return;
            }
            state.money -= 3000;
            state.boostMiniGames = 2;
            state.boostMiniGamesEnd = Date.now() + 120000;
            playSound('buy');
            showToast('🎮 x2 доход с мини-игр активирован на 2 минуты!', false);
            updateUI();
            updateBoostUI();
            setTimeout(() => {
                state.boostMiniGames = 1;
                state.boostMiniGamesEnd = 0;
                updateUI();
                showToast('⏱️ Буст мини-игр закончился', false);
            }, 120000);
        });

        // Автокликер тик
        setInterval(() => {
            if (!currentUser) return;
            const cps = (state.autoClickers || 0) * 0.5 * (state.autoClickLevel || 1) * (state.prestigeBonus || 1) * (state.boostClickMultiplier || 1);
            if (cps > 0) {
                state.money += cps / 10;
                state.totalMoneyEarned += cps / 10;
                updateUI();
            }
        }, 100);

        setInterval(saveState, 10000);

        loadUser();
        console.log('🌱 Кликер с обновлениями загружен!');
    </script>
</body>
                </html>
