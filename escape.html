<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🏃 Побег от Cool Kid (Subway)</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;user-select:none}
        body{background:#0a0a1a;min-height:100vh;display:flex;justify-content:center;align-items:center;font-family:'Segoe UI',sans-serif;padding:8px}
        .game{background:#1a1a2e;border-radius:30px;padding:12px;max-width:420px;width:100%;border:3px solid #4a6a9a;box-shadow:0 20px 40px rgba(0,0,0,.7);display:flex;flex-direction:column;min-height:580px}
        .back-btn{background:#7a3a3a;color:#fff;border:none;padding:6px;border-radius:12px;font-size:10px;font-weight:700;cursor:pointer;margin-bottom:4px;border:2px solid #aa5a5a;width:100%}
        .back-btn:active{transform:scale(.95)}
        .header{color:#ffd700;font-size:16px;font-weight:700;text-align:center;margin:2px 0}
        .timer{color:#ff6b6b;font-size:20px;font-weight:700;text-align:center}
        .score{color:#ffd700;font-size:13px;font-weight:700;text-align:center}
        .result{color:#ffd700;font-size:15px;font-weight:700;text-align:center;min-height:20px}
        .canvas-wrap{position:relative;background:#1a1a2e;border-radius:16px;border:3px solid #4a6a9a;width:100%;max-width:360px;aspect-ratio:1/1;touch-action:none;overflow:hidden;margin:4px auto}
        .canvas-wrap canvas{width:100%;height:100%;border-radius:14px;display:block;touch-action:none;position:relative;z-index:1}
        .joystick-area{position:absolute;bottom:0;left:0;right:0;top:0;z-index:2;touch-action:none}
        .footer{color:#8aaa8a;text-align:center;font-size:7px;margin-top:3px}
        .toast{position:fixed;top:10px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);color:#ffd700;padding:6px 16px;border-radius:16px;font-size:12px;font-weight:700;z-index:999;border:2px solid #ffd700;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
        .toast.show{opacity:1}
        .toast.error{border-color:#ff6b6b;color:#ff6b6b}
        .game-over-overlay{
            position:absolute;
            top:0;left:0;right:0;bottom:0;
            background:rgba(0,0,0,.8);
            border-radius:14px;
            display:none;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            z-index:10;
        }
        .game-over-overlay.active{display:flex}
        .game-over-overlay .go-text{color:#ff6b6b;font-size:36px;font-weight:700;text-shadow:0 0 40px rgba(255,0,0,.5)}
        .game-over-overlay .go-score{color:#ffd700;font-size:18px;margin:6px 0}
        .game-over-overlay .go-btn{
            background:#3a8a3a;
            color:#f0f7d0;
            border:none;
            padding:10px 30px;
            border-radius:16px;
            font-size:16px;
            font-weight:700;
            cursor:pointer;
            margin-top:8px;
            border:2px solid #5aaa5a;
        }
        .game-over-overlay .go-btn:active{transform:scale(.92)}
    </style>
</head>
<body>
    <div class="toast" id="toast">✅ Готово!</div>
    <div class="game">
        <button class="back-btn" onclick="location.href='index.html'">🏠 На главную</button>
        <div class="header">🏃 ПОБЕГ ОТ COOL KID (Бесконечный)</div>
        <div class="timer" id="timer">⏱️ 0 м</div>
        <div class="score" id="score">🏆 Очки: 0</div>
        <div class="result" id="result"></div>
        <div class="canvas-wrap" style="position:relative;">
            <canvas id="gameCanvas"></canvas>
            <div class="joystick-area" id="joystick"></div>
            <div class="game-over-overlay" id="gameOverOverlay">
                <div class="go-text">💀 ИГРА ОКОНЧЕНА</div>
                <div class="go-score" id="goScore">Очки: 0</div>
                <div class="go-score" id="goDistance">Дистанция: 0 м</div>
                <button class="go-btn" id="restartBtn">🔄 Играть снова</button>
            </div>
        </div>
        <div class="footer" id="statusMsg">🕹️ Управляй пальцем, обходи препятствия!</div>
    </div>
    <script src="data.js"></script>
    <script>
        // ================================================================
        //  ПОБЕГ ОТ COOL KID (Subway Surfers стиль)
        //  Препятствия СТОЯТ на месте, их НАДО ОБХОДИТЬ
        //  При касании — смерть!
        // ================================================================

        let currentUser = null;
        let state = { coolkidWins: 0 };

        let running = false;
        let interval = null;
        let score = 0;
        let distance = 0;
        let speed = 4;
        let maxSpeed = 12;

        let player = { x: 0, y: 0 };
        let obstacles = [];
        let enemy = { x: 0, y: 0 };

        let canvas, ctx, width, height;
        let touchX = 0,
            touchY = 0;
        let touchId = null;
        const PLAYER_SIZE = 30;
        const OBSTACLE_SIZE = 32;
        let spawnTimer = 0;
        let frameCount = 0;

        let gameOver = false;
        let gameOverShown = false;

        function showToast(msg, isError = false) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.className = 'toast' + (isError ? ' error' : '');
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 2500);
        }

        function loadUser() {
            const user = getCurrentUser();
            if (!user) {
                document.getElementById('statusMsg').textContent = '⚠️ Войди в аккаунт!';
                document.getElementById('statusMsg').style.color = '#ff6b6b';
                return false;
            }
            currentUser = user;
            const userState = getUserState(user);
            if (userState) {
                state = { ...state, ...userState };
            }
            return true;
        }

        function saveState() {
            if (currentUser) {
                saveUserState(currentUser, state);
            }
        }

        function startGame() {
            if (!loadUser()) { showToast('⚠️ Войди в аккаунт!', true); return; }
            if (running) return;

            document.getElementById('gameOverOverlay').classList.remove('active');
            document.getElementById('result').textContent = '';
            running = true;
            gameOver = false;
            gameOverShown = false;
            score = 0;
            distance = 0;
            speed = 4;
            spawnTimer = 0;
            frameCount = 0;
            obstacles = [];

            canvas = document.getElementById('gameCanvas');
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
            ctx = canvas.getContext('2d');
            width = canvas.width;
            height = canvas.height;

            player = { x: width / 2, y: height - 100 };
            enemy = { x: 0, y: 0 };

            if (interval) clearInterval(interval);
            interval = setInterval(() => {
                distance++;
                document.getElementById('timer').textContent = `⏱️ ${distance} м`;
                updateSpeed();
            }, 100);

            const joystick = document.getElementById('joystick');
            joystick.addEventListener('touchstart', touchStart, { passive: false });
            joystick.addEventListener('touchmove', touchMove, { passive: false });
            joystick.addEventListener('touchend', touchEnd, { passive: false });
            joystick.addEventListener('mousemove', mouseMove);
            joystick.addEventListener('mouseleave', () => { touchX = 0;
                touchY = 0; });

            document.getElementById('statusMsg').textContent = '🏃 Беги! Обходи препятствия!';
            document.getElementById('statusMsg').style.color = '#8aaa8a';

            requestAnimationFrame(gameLoop);
        }

        function updateSpeed() {
            if (distance < 50) speed = 3 + distance / 30;
            else if (distance < 150) speed = 4 + (distance - 50) / 40;
            else if (distance < 300) speed = 6 + (distance - 150) / 50;
            else speed = Math.min(maxSpeed, 8 + (distance - 300) / 80);
            document.getElementById('speed').textContent = speed.toFixed(1);
        }

        function touchStart(e) {
            e.preventDefault();
            const touch = e.touches[0];
            if (!touch) return;
            touchId = touch.identifier;
            touchX = touch.clientX;
            touchY = touch.clientY;
        }

        function touchMove(e) {
            e.preventDefault();
            const touch = Array.from(e.touches).find(t => t.identifier === touchId);
            if (!touch) return;
            touchX = touch.clientX;
            touchY = touch.clientY;
        }

        function touchEnd(e) {
            touchId = null;
            touchX = 0;
            touchY = 0;
        }

        function mouseMove(e) {
            const rect = canvas.getBoundingClientRect();
            const isOver = e.clientX >= rect.left && e.clientX <= rect.right &&
                e.clientY >= rect.top && e.clientY <= rect.bottom;
            if (isOver) {
                touchX = e.clientX;
                touchY = e.clientY;
            } else {
                touchX = 0;
                touchY = 0;
            }
        }

        function getDir() {
            if (!touchX || !touchY) return { x: 0, y: 0 };
            const rect = canvas.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const dx = (touchX - centerX) / (rect.width / 2);
            const dy = (touchY - centerY) / (rect.height / 2);
            const len = Math.sqrt(dx * dx + dy * dy);
            if (len > 1) return { x: dx / len, y: dy / len };
            return { x: dx, y: dy };
        }

        function gameLoop() {
            if (!running) return;
            frameCount++;
            updateGame();
            drawGame();
            if (!gameOver) {
                requestAnimationFrame(gameLoop);
            } else {
                if (!gameOverShown) {
                    gameOverShown = true;
                    showGameOver();
                }
            }
        }

        function updateGame() {
            // Управление
            const dir = getDir();
            if (Math.abs(dir.x) > 0.1 || Math.abs(dir.y) > 0.1) {
                player.x += dir.x * speed * 1.2;
                player.y += dir.y * speed * 1.2;
            }

            // Границы
            const margin = PLAYER_SIZE / 2 + 5;
            player.x = Math.max(margin, Math.min(width - margin, player.x));
            player.y = Math.max(margin, Math.min(height - margin, player.y));

            // Спавн препятствий
            spawnTimer++;
            let spawnRate = Math.max(15, 40 - distance / 20);
            if (spawnTimer > spawnRate + Math.random() * 20) {
                spawnTimer = 0;
                const side = Math.random();
                let x, y;
                if (side < 0.3) {
                    x = PLAYER_SIZE + 10;
                    y = Math.random() * (height - 60) + 30;
                } else if (side < 0.6) {
                    x = width - PLAYER_SIZE - 10;
                    y = Math.random() * (height - 60) + 30;
                } else {
                    x = Math.random() * (width - 60) + 30;
                    y = PLAYER_SIZE + 10;
                }
                obstacles.push({
                    x: x,
                    y: y,
                    size: OBSTACLE_SIZE + Math.random() * 15,
                    type: Math.floor(Math.random() * 4),
                    speed: 0
                });
            }

            // Проверка столкновения с препятствиями
            for (let obs of obstacles) {
                const dx = player.x - obs.x;
                const dy = player.y - obs.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < PLAYER_SIZE / 2 + obs.size / 2) {
                    // СМЕРТЬ!
                    endGame();
                    return;
                }
            }

            // Очки
            if (frameCount % 10 === 0) {
                score++;
                document.getElementById('score').textContent = `🏆 Очки: ${score}`;
            }

            // Очистка препятствий (удаляем только если они далеко за пределами)
            obstacles = obstacles.filter(obs => {
                return obs.x > -50 && obs.x < width + 50 &&
                    obs.y > -50 && obs.y < height + 50;
            });

            // Враг (Cool Kid) — бежит за тобой, но медленнее
            const dx = player.x - enemy.x;
            const dy = player.y - enemy.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist > 1) {
                const enemySpeed = 1.2 + speed / 6;
                enemy.x += (dx / dist) * Math.min(enemySpeed, 3);
                enemy.y += (dy / dist) * Math.min(enemySpeed, 3);
            }
            enemy.x = Math.max(PLAYER_SIZE / 2, Math.min(width - PLAYER_SIZE / 2, enemy.x));
            enemy.y = Math.max(PLAYER_SIZE / 2, Math.min(height - PLAYER_SIZE / 2, enemy.y));

            // Проверка столкновения с врагом
            const dx2 = player.x - enemy.x;
            const dy2 = player.y - enemy.y;
            const dist2 = Math.sqrt(dx2 * dx2 + dy2 * dy2);
            if (dist2 < PLAYER_SIZE / 2 + PLAYER_SIZE / 2) {
                endGame();
                return;
            }
        }

        function drawGame() {
            ctx.clearRect(0, 0, width, height);
            // Фон
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, width, height);

            // Дорожка (линии)
            for (let i = 0; i < width; i += 40) {
                for (let j = 0; j < height; j += 40) {
                    ctx.fillStyle = (i / 40 + j / 40) % 2 === 0 ? '#222244' : '#1a1a36';
                    ctx.fillRect(i, j, 40, 40);
                }
            }

            // Препятствия (НЕ ДВИГАЮТСЯ!)
            for (let obs of obstacles) {
                const colors = ['#ff6b6b', '#ffd93d', '#6bcb77', '#4d96ff'];
                ctx.shadowColor = colors[obs.type % colors.length];
                ctx.shadowBlur = 20;
                ctx.fillStyle = colors[obs.type % colors.length];
                ctx.beginPath();
                if (obs.type === 0) {
                    ctx.fillRect(obs.x - obs.size / 2, obs.y - obs.size / 2, obs.size, obs.size);
                } else if (obs.type === 1) {
                    ctx.arc(obs.x, obs.y, obs.size / 2, 0, Math.PI * 2);
                    ctx.fill();
                } else if (obs.type === 2) {
                    ctx.moveTo(obs.x, obs.y - obs.size / 2);
                    ctx.lineTo(obs.x - obs.size / 2, obs.y + obs.size / 2);
                    ctx.lineTo(obs.x + obs.size / 2, obs.y + obs.size / 2);
                    ctx.closePath();
                    ctx.fill();
                } else {
                    // Ромб
                    ctx.moveTo(obs.x, obs.y - obs.size / 2);
                    ctx.lineTo(obs.x + obs.size / 2, obs.y);
                    ctx.lineTo(obs.x, obs.y + obs.size / 2);
                    ctx.lineTo(obs.x - obs.size / 2, obs.y);
                    ctx.closePath();
                    ctx.fill();
                }
                ctx.shadowBlur = 0;
                // Эмодзи
                ctx.font = '18px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = '#fff';
                const emojis = ['🧱', '🚧', '⛔', '💢'];
                ctx.fillText(emojis[obs.type % emojis.length], obs.x, obs.y);
            }

            // Игрок
            ctx.shadowColor = '#4a9a4a';
            ctx.shadowBlur = 30;
            ctx.fillStyle = '#6ab04a';
            ctx.beginPath();
            ctx.arc(player.x, player.y, PLAYER_SIZE / 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.font = '24px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = '#fff';
            ctx.fillText('🧑‍🌾', player.x, player.y);

            // Враг (Cool Kid)
            ctx.shadowColor = '#ff4444';
            ctx.shadowBlur = 30;
            ctx.fillStyle = '#cc2222';
            ctx.beginPath();
            ctx.arc(enemy.x, enemy.y, PLAYER_SIZE / 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.font = '24px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = '#fff';
            ctx.fillText('😎', enemy.x, enemy.y);
            ctx.font = '10px sans-serif';
            ctx.fillStyle = '#ff6666';
            ctx.fillText('COOL KID', enemy.x, enemy.y - PLAYER_SIZE / 2 - 12);

            // Рамка
            ctx.strokeStyle = '#4a6a9a';
            ctx.lineWidth = 3;
            ctx.strokeRect(2, 2, width - 4, height - 4);
            ctx.strokeStyle = '#3a5a7a';
            ctx.lineWidth = 1;
            ctx.setLineDash([6, 6]);
            ctx.strokeRect(6, 6, width - 12, height - 12);
            ctx.setLineDash([]);

            // Скорость
            ctx.font = '12px sans-serif';
            ctx.fillStyle = '#ffd700';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'top';
            ctx.fillText(`⚡ ${speed.toFixed(1)}`, 8, 8);
        }

        function endGame() {
            if (gameOver) return;
            gameOver = true;
            running = false;
            if (interval) clearInterval(interval);
            document.getElementById('result').textContent = '💀 Ты врезался!';
            document.getElementById('result').style.color = '#ff6b6b';

            // Награда
            const reward = Math.floor(score / 5) + 1;
            const userState = getUserState(currentUser);
            if (userState) {
                userState.money = (userState.money || 0) + reward;
                state.coolkidWins = (state.coolkidWins || 0) + 1;
                saveUserState(currentUser, userState);
                saveState();
            }
            showToast(`😵 +${reward}💰 за попытку!`, false);
        }

        function showGameOver() {
            document.getElementById('goScore').textContent = `🏆 Очки: ${score}`;
            document.getElementById('goDistance').textContent = `📏 Дистанция: ${distance} м`;
            document.getElementById('gameOverOverlay').classList.add('active');
            document.getElementById('statusMsg').textContent = '💀 Игра окончена! Нажми "Играть снова"';
            document.getElementById('statusMsg').style.color = '#ff6b6b';
        }

        document.getElementById('restartBtn').addEventListener('click', () => {
            document.getElementById('gameOverOverlay').classList.remove('active');
            startGame();
        });

        // Загрузка
        loadUser();

        // Старт по клику
        document.querySelector('.canvas-wrap').addEventListener('click', () => {
            if (!running) startGame();
        });
        document.querySelector('.canvas-wrap').addEventListener('touchstart', (e) => {
            if (!running) { e.preventDefault();
                startGame(); }
        });

        console.log('🏃 Побег (Subway Surfers стиль) загружен!');
        console.log('⚠️ Препятствия НЕ ДВИГАЮТСЯ! Их надо обходить!');
    </script>
</body>
    </html>
