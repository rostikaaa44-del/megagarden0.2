<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌱 Сад-Кликер</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            background: linear-gradient(145deg, #0f1f0f, #1e3a1e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 10px;
            touch-action: none;
        }
        .game {
            background: #2d5a2d;
            border-radius: 40px;
            padding: 16px;
            max-width: 440px;
            width: 100%;
            border: 3px solid #4d8a4d;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            min-height: 600px;
            position: relative;
        }
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 3px;
            background: #1f3f1f;
            padding: 6px 8px;
            border-radius: 28px;
            margin-bottom: 6px;
            border: 2px solid #4d7a4d;
        }
        .stat-item { color: #e8f5d0; font-weight: bold; font-size: 9px; text-align: center; }
        .stat-item span { color: #ffd700; font-size: 13px; display: block; }

        .center-area { flex: 1; display: flex; justify-content: center; align-items: center; min-height: 160px; padding: 6px 0; }
        .click-btn {
            width: 150px; height: 150px; border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #6ab04a, #1f4a1f);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; border: 4px solid #8fc98f;
            box-shadow: 0 8px 0 #0f2a0f, 0 12px 30px rgba(0,0,0,0.6);
            transition: all 0.08s ease;
        }
        .click-btn:active { transform: translateY(6px); box-shadow: 0 2px 0 #0f2a0f, 0 8px 20px rgba(0,0,0,0.5); }
        .click-emoji { font-size: 56px; line-height: 1; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3)); }
        .click-btn:active .click-emoji { transform: scale(0.8); }
        .click-hint { color: #d4ecd4; font-size: 11px; margin-top: 2px; font-weight: bold; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }

        .click-float {
            position: fixed; font-weight: bold; font-size: 28px; color: #ffd700;
            text-shadow: 0 0 20px #ffa500, 0 0 40px #ff6600;
            pointer-events: none; animation: floatUp 1s ease-out forwards; z-index: 999;
        }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-120px) scale(1.5); } }

        .bottom-section { flex-shrink: 0; margin-top: 4px; }
        .tab-bar {
            display: grid; grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 4px; margin: 4px 0 6px 0;
        }
        .tab-btn {
            background: #1f3f1f; color: #8aaa8a; border: 2px solid #3d6a3d;
            padding: 5px 0; border-radius: 14px; cursor: pointer;
            font-weight: bold; font-size: 9px; transition: all 0.12s;
            touch-action: manipulation;
        }
        .tab-btn.active { background: #3d7a3d; color: #f0f7d0; border-color: #6fbf6f; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .shop {
            display: grid; grid-template-columns: 1fr 1fr 1fr;
            gap: 3px; margin: 3px 0; max-height: 180px; overflow-y: auto;
        }
        .shop::-webkit-scrollbar { width: 3px; }
        .shop::-webkit-scrollbar-thumb { background: #4d8a4d; border-radius: 8px; }
        .shop-btn {
            background: #1f4a1f; color: #e8f5d0; border: 2px solid #4d8a4d;
            padding: 3px 2px; border-radius: 10px; font-weight: bold;
            font-size: 8px; cursor: pointer; transition: all 0.12s;
            text-align: center; line-height: 1.1; touch-action: manipulation;
        }
        .shop-btn:active { transform: scale(0.92); background: #123012; }
        .shop-btn.disabled { opacity: 0.4; filter: grayscale(0.7); pointer-events: none; }
        .shop-btn .price { color: #ffd700; display: block; font-size: 7px; }
        .shop-btn .owned { color: #7fbf7f; display: block; font-size: 7px; }
        .shop-btn .bonus { color: #6fcfcf; display: block; font-size: 7px; }
        .shop-btn.bought { border-color: #ffd700; background: #2a5a2a; }

        .actions {
            display: grid; grid-template-columns: 1fr 1fr 1fr;
            gap: 3px; margin-top: 4px;
        }
        .action-btn {
            background: #8f7a3a; color: #1e2a1e; border: none;
            padding: 5px 0; border-radius: 14px; font-weight: bold;
            font-size: 8px; cursor: pointer; border: 2px solid #c4a84a;
            transition: all 0.12s; touch-action: manipulation;
        }
        .action-btn:active { transform: scale(0.92); background: #6f5f2a; }
        .action-btn.danger { background: #7a3a3a; border-color: #aa5a5a; color: #f0d0d0; }
        .action-btn.gold { background: #c49a3a; border-color: #eac464; }
        .action-btn.minigame { background: #4a6a9a; border-color: #6a9aca; color: #f0f7ff; }
        .action-btn.minigame:active { background: #2a4a7a; }
        .action-btn.profile { background: #6a4a8a; border-color: #9a6aca; color: #f0d0ff; }

        .seed-list {
            background: #1a3a1a; border-radius: 12px; padding: 6px;
            max-height: 90px; overflow-y: auto; margin-top: 4px;
            border: 2px solid #3d6a3d;
        }
        .seed-item {
            display: flex; justify-content: space-between; padding: 2px 4px;
            color: #cde0cd; font-size: 8px; border-bottom: 1px solid #2a4a2a;
        }
        .seed-item .sname { color: #ffd700; }
        .seed-item .sprice { color: #7fbf7f; }
        .seed-item .sbonus { color: #6fcfcf; }

        .footer { color: #8aaa8a; text-align: center; font-size: 8px; margin-top: 3px; }

        /* ===== МИНИ-ИГРА ===== */
        .minigame-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: #0a0a1a; z-index: 1000; display: none;
            flex-direction: column; align-items: center; justify-content: center;
            padding: 10px;
        }
        .minigame-overlay.active { display: flex; }
        .minigame-header { color: #fff; font-size: 16px; font-weight: bold; text-align: center; }
        .minigame-timer { color: #ff6b6b; font-size: 22px; font-weight: bold; margin: 4px 0; text-shadow: 0 0 20px rgba(255,0,0,0.5); }
        .minigame-score { color: #ffd700; font-size: 16px; font-weight: bold; margin: 2px 0; }
        .minigame-result { color: #ffd700; font-size: 18px; font-weight: bold; margin: 4px 0; text-align: center; min-height: 24px; }

        .minigame-canvas-wrap {
            position: relative; background: #1a1a2e; border-radius: 20px;
            border: 3px solid #4a6a9a; width: 100%; max-width: 380px;
            aspect-ratio: 1 / 1; touch-action: none; overflow: hidden;
        }
        .minigame-canvas-wrap canvas {
            width: 100%; height: 100%; border-radius: 18px; display: block;
            touch-action: none; position: relative; z-index: 1;
        }

        /* Джойстик */
        .joystick-area {
            position: absolute; bottom: 0; left: 0; right: 0; top: 0;
            z-index: 2; touch-action: none;
        }

        .minigame-close {
            background: #7a3a3a; color: #fff; border: none;
            padding: 8px 24px; border-radius: 24px; font-size: 14px;
            font-weight: bold; cursor: pointer; margin-top: 6px;
            border: 2px solid #aa5a5a; touch-action: manipulation;
        }
        .minigame-close:active { transform: scale(0.92); background: #5a2a2a; }

        /* ===== АВТОРИЗАЦИЯ ===== */
        .auth-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9); z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 30px;
        }
        .auth-overlay.hidden { display: none; }
        .auth-box {
            background: #2d5a2d; padding: 30px 25px; border-radius: 30px;
            border: 3px solid #4d8a4d; max-width: 350px; width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }
        .auth-box h2 { color: #ffd700; text-align: center; font-size: 22px; margin-bottom: 16px; }
        .auth-box input {
            width: 100%; padding: 12px 15px; margin: 6px 0; border-radius: 16px;
            border: 2px solid #4d7a4d; background: #1f3f1f; color: #e8f5d0;
            font-size: 14px; outline: none;
        }
        .auth-box input::placeholder { color: #6a8a6a; }
        .auth-box button {
            width: 100%; padding: 12px; margin: 6px 0; border-radius: 20px;
            border: none; font-weight: bold; font-size: 16px; cursor: pointer;
            transition: all 0.12s; touch-action: manipulation;
        }
        .auth-box button:active { transform: scale(0.95); }
        .auth-btn-login { background: #6ab04a; color: #1e2a1e; }
        .auth-btn-register { background: #c49a3a; color: #1e2a1e; }
        .auth-error { color: #ff6b6b; font-size: 12px; text-align: center; margin: 4px 0; min-height: 18px; }
        .auth-success { color: #6fcf6f; font-size: 12px; text-align: center; margin: 4px 0; min-height: 18px; }
        .auth-toggle { color: #8aaa8a; text-align: center; font-size: 12px; margin-top: 8px; cursor: pointer; text-decoration: underline; touch-action: manipulation; }
        .auth-toggle:active { color: #ffd700; }
    </style>
</head>
<body>
    <div class="game" id="gameContainer">
        <div class="stats">
            <div class="stat-item">💰 <span id="money">0</span></div>
            <div class="stat-item">🌱 <span id="seeds">0</span></div>
            <div class="stat-item">⚡ <span id="cps">0</span></div>
            <div class="stat-item">👤 <span id="playerName">Гость</span></div>
        </div>

        <div class="center-area">
            <div class="click-btn" id="clickBtn">
                <div class="click-emoji">🧑‍🌾</div>
                <div class="click-hint">👆 Тапай!</div>
            </div>
        </div>

        <div class="bottom-section">
            <div class="tab-bar">
                <button class="tab-btn active" data-tab="shop">🏪 Магазин</button>
                <button class="tab-btn" data-tab="seeds">🌱 Семена</button>
                <button class="tab-btn minigame" id="minigameBtn">🎮 Игра</button>
                <button class="tab-btn profile" id="profileBtn">👤 Профиль</button>
            </div>

            <div class="tab-content active" id="tab-shop">
                <div class="shop" id="shopContainer"></div>
                <div class="actions">
                    <button class="action-btn gold" id="prestigeBtn">✨ Перерождение</button>
                    <button class="action-btn" id="autoClickBtn">🤖 Автокликер</button>
                    <button class="action-btn danger" id="resetBtn">🔄 Сброс</button>
                </div>
            </div>

            <div class="tab-content" id="tab-seeds">
                <div class="seed-list" id="seedList"></div>
            </div>

            <div class="footer" id="achievementDisplay">🏅 Достижения: 0</div>
        </div>
    </div>

    <!-- ===== АВТОРИЗАЦИЯ ===== -->
    <div class="auth-overlay" id="authOverlay">
        <div class="auth-box">
            <h2 id="authTitle">🌱 Вход в сад</h2>
            <div class="auth-error" id="authError"></div>
            <div class="auth-success" id="authSuccess"></div>
            <input type="text" id="authLogin" placeholder="👤 Имя пользователя">
            <input type="password" id="authPassword" placeholder="🔒 Пароль">
            <div id="authExtraFields"></div>
            <button class="auth-btn-login" id="authSubmitBtn">Войти</button>
            <div class="auth-toggle" id="authToggle">Нет аккаунта? Зарегистрироваться</div>
        </div>
    </div>

    <!-- ===== МИНИ-ИГРА ===== -->
    <div class="minigame-overlay" id="minigameOverlay">
        <div class="minigame-header">🏃 СУБВЕЙ САД</div>
        <div class="minigame-timer" id="minigameTimer">⏱️ 2:00</div>
        <div class="minigame-score" id="minigameScore">🏆 Очки: 0</div>
        <div class="minigame-result" id="minigameResult"></div>
        <div class="minigame-canvas-wrap">
            <canvas id="minigameCanvas"></canvas>
            <div class="joystick-area" id="joystickArea"></div>
        </div>
        <button class="minigame-close" id="minigameClose">🚪 Выйти</button>
    </div>

    <script>
        // ============================================================
        //  СИСТЕМА ПРОФИЛЕЙ + ИГРА
        // ============================================================

        let state = {
            money: 0,
            seeds: 0,
            prestigeLevel: 0,
            prestigeBonus: 1,
            autoClickers: 0,
            autoClickLevel: 1,
            totalClicks: 0,
            totalMoneyEarned: 0,
            achievements: [],
            seedInventory: {},
            clickMultiplier: 1,
            goldenSeedChance: 0,
            clickBonus: 0,
            growth: 0,
            minigameWins: 0,
            daySkipCount: 0,
        };

        let currentUsername = null;

        // ---- БАЗА ДАННЫХ ----
        function getUsers() {
            try {
                const data = localStorage.getItem('gardenUsers');
                return data ? JSON.parse(data) : {};
            } catch(e) { return {}; }
        }

        function saveUsers(users) {
            localStorage.setItem('gardenUsers', JSON.stringify(users));
        }

        function getCurrentUser() {
            try {
                const data = localStorage.getItem('gardenCurrentUser');
                return data ? JSON.parse(data) : null;
            } catch(e) { return null; }
        }

        function setCurrentUser(username) {
            if (username) {
                localStorage.setItem('gardenCurrentUser', JSON.stringify(username));
            } else {
                localStorage.removeItem('gardenCurrentUser');
            }
        }

        // ---- ГЕНЕРАЦИЯ 80 СЕМЯН ----
        function generateSeeds() {
            const seeds = [];
            const names = [
                'Помидор', 'Огурец', 'Морковь', 'Картофель', 'Лук', 'Чеснок', 'Капуста', 'Свекла',
                'Репа', 'Редис', 'Тыква', 'Кабачок', 'Баклажан', 'Перец', 'Горох', 'Фасоль',
                'Кукуруза', 'Пшеница', 'Рожь', 'Овес', 'Гречиха', 'Рис', 'Ячмень', 'Просо',
                'Подсолнух', 'Клубника', 'Малина', 'Смородина', 'Крыжовник', 'Ежевика', 'Голубика', 'Брусника',
                'Арбуз', 'Дыня', 'Абрикос', 'Персик', 'Слива', 'Вишня', 'Черешня', 'Груша',
                'Яблоня', 'Айва', 'Гранат', 'Инжир', 'Финик', 'Банан', 'Манго', 'Ананас',
                'Папайя', 'Гуава', 'Маракуйя', 'Киви', 'Личи', 'Рамбутан', 'Дуриан', 'Джекфрут',
                'Кокос', 'Миндаль', 'Фисташка', 'Кешью', 'Грецкий', 'Фундук', 'Каштан', 'Пекан',
                'Арахис', 'Бобы', 'Чечевица', 'Нут', 'Соя', 'Кунжут', 'Лен', 'Чиа',
                'Базилик', 'Укроп', 'Петрушка', 'Кинза', 'Мята', 'Розмарин', 'Тимьян', 'Орегано'
            ];
            let basePrice = 5;
            for (let i = 0; i < 80; i++) {
                const tier = Math.floor(i / 10) + 1;
                const bonus = Math.min(0.05 + (tier - 1) * 0.05, 0.2);
                seeds.push({
                    id: i,
                    name: names[i % names.length] + (i >= names.length ? ` ${Math.floor(i/names.length)+1}` : ''),
                    basePrice: Math.floor(basePrice * (1.2 + (tier * 0.1))),
                    tier: tier,
                    bonus: Math.round(bonus * 100) / 100,
                    emoji: ['🌱','🍅','🥒','🥕','🥔','🧅','🧄','🥬','🌿','🌻','🍓','🍉','🍇','🍊','🍑','🥭','🍍','🥝','🍒','🍎'][i % 20] || '🌿'
                });
                basePrice *= 1.05 + (i / 300);
            }
            return seeds;
        }
        const ALL_SEEDS = generateSeeds();

        function getSeedPrice(seedId) {
            return ALL_SEEDS[seedId].basePrice;
        }

        const ACHIEVEMENTS = [
            { id: 'first_click', name: 'Первый шаг', desc: 'Сделать 1 клик', check: () => state.totalClicks >= 1 },
            { id: 'click_100', name: 'Трудяга', desc: 'Сделать 100 кликов', check: () => state.totalClicks >= 100 },
            { id: 'click_1000', name: 'Кликер-мастер', desc: 'Сделать 1000 кликов', check: () => state.totalClicks >= 1000 },
            { id: 'money_100', name: 'Первые деньги', desc: 'Заработать 100💰', check: () => state.totalMoneyEarned >= 100 },
            { id: 'money_1000', name: 'Инвестор', desc: 'Заработать 1000💰', check: () => state.totalMoneyEarned >= 1000 },
            { id: 'money_10000', name: 'Магнат', desc: 'Заработать 10000💰', check: () => state.totalMoneyEarned >= 10000 },
            { id: 'seeds_10', name: 'Садовод', desc: 'Купить 10 семян', check: () => Object.values(state.seedInventory).filter(v=>v===1).length >= 10 },
            { id: 'seeds_30', name: 'Агроном', desc: 'Купить 30 семян', check: () => Object.values(state.seedInventory).filter(v=>v===1).length >= 30 },
            { id: 'seeds_50', name: 'Земледелец', desc: 'Купить 50 семян', check: () => Object.values(state.seedInventory).filter(v=>v===1).length >= 50 },
            { id: 'prestige_1', name: 'Возрождение', desc: 'Сделать 1 перерождение', check: () => state.prestigeLevel >= 1 },
            { id: 'prestige_5', name: 'Философ', desc: 'Сделать 5 перерождений', check: () => state.prestigeLevel >= 5 },
            { id: 'auto_10', name: 'Автоматизация', desc: 'Купить 10 автокликеров', check: () => state.autoClickers >= 10 },
            { id: 'minigame_win', name: 'Побег', desc: 'Выиграть в мини-игре', check: () => state.minigameWins >= 1 },
            { id: 'growth_100', name: 'Рост', desc: 'Достичь 100% роста', check: () => state.growth >= 100 },
        ];

        // ---- ФУНКЦИИ АВТОРИЗАЦИИ ----
        function showAuthScreen(mode) {
            const overlay = document.getElementById('authOverlay');
            overlay.classList.remove('hidden');
            document.getElementById('authError').textContent = '';
            document.getElementById('authSuccess').textContent = '';
            document.getElementById('authLogin').value = '';
            document.getElementById('authPassword').value = '';
            document.getElementById('authExtraFields').innerHTML = '';

            if (mode === 'login') {
                document.getElementById('authTitle').textContent = '🌱 Вход в сад';
                document.getElementById('authSubmitBtn').textContent = 'Войти';
                document.getElementById('authSubmitBtn').className = 'auth-btn-login';
                document.getElementById('authToggle').textContent = 'Нет аккаунта? Зарегистрироваться';
                document.getElementById('authToggle').dataset.mode = 'register';
            } else {
                document.getElementById('authTitle').textContent = '🌱 Регистрация';
                document.getElementById('authSubmitBtn').textContent = 'Создать аккаунт';
                document.getElementById('authSubmitBtn').className = 'auth-btn-register';
                document.getElementById('authToggle').textContent = 'Уже есть аккаунт? Войти';
                document.getElementById('authToggle').dataset.mode = 'login';
                document.getElementById('authExtraFields').innerHTML = `
                    <input type="password" id="authPassword2" placeholder="🔒 Повторите пароль">
                `;
            }
        }

        function handleAuth() {
            const login = document.getElementById('authLogin').value.trim();
            const password = document.getElementById('authPassword').value.trim();
            const errorEl = document.getElementById('authError');
            const successEl = document.getElementById('authSuccess');
            errorEl.textContent = '';
            successEl.textContent = '';

            if (!login || !password) {
                errorEl.textContent = 'Заполните все поля!';
                return;
            }

            const isRegister = document.getElementById('authSubmitBtn').textContent === 'Создать аккаунт';
            const users = getUsers();

            if (isRegister) {
                const password2 = document.getElementById('authPassword2').value.trim();
                if (password !== password2) {
                    errorEl.textContent = 'Пароли не совпадают!';
                    return;
                }
                if (users[login]) {
                    errorEl.textContent = 'Пользователь уже существует!';
                    return;
                }
                users[login] = {
                    password: password,
                    state: { ...state }
                };
                saveUsers(users);
                successEl.textContent = '✅ Аккаунт создан! Входим...';
                setTimeout(() => loginUser(login), 500);
            } else {
                if (!users[login] || users[login].password !== password) {
                    errorEl.textContent = 'Неверное имя или пароль!';
                    return;
                }
                successEl.textContent = '✅ Добро пожаловать!';
                setTimeout(() => loginUser(login), 500);
            }
        }

        function loginUser(username) {
            const users = getUsers();
            if (!users[username]) return;
            setCurrentUser(username);
            currentUsername = username;
            document.getElementById('authOverlay').classList.add('hidden');
            if (users[username].state) {
                state = { ...state, ...users[username].state };
            }
            updateUI();
            updateProfileUI();
        }

        function logoutUser() {
            if (confirm('Выйти из аккаунта? Прогресс сохранится.')) {
                savePlayerState();
                setCurrentUser(null);
                currentUsername = null;
                state = {
                    money: 0, seeds: 0, prestigeLevel: 0, prestigeBonus: 1,
                    autoClickers: 0, autoClickLevel: 1, totalClicks: 0,
                    totalMoneyEarned: 0, achievements: [], seedInventory: {},
                    clickMultiplier: 1, goldenSeedChance: 0, clickBonus: 0,
                    growth: 0, minigameWins: 0, daySkipCount: 0,
                };
                updateUI();
                showAuthScreen('login');
            }
        }

        function savePlayerState() {
            if (!currentUsername) return;
            const users = getUsers();
            if (users[currentUsername]) {
                users[currentUsername].state = { ...state };
                saveUsers(users);
            }
        }

        function loadPlayerState(username) {
            const users = getUsers();
            if (users[username] && users[username].state) {
                state = { ...state, ...users[username].state };
                return true;
            }
            return false;
        }

        function updateProfileUI() {
            document.getElementById('playerName').textContent = currentUsername || 'Гость';
        }

        function showProfileSettings() {
            if (!currentUsername) {
                alert('Вы не авторизованы!');
                return;
            }
            const users = getUsers();
            const user = users[currentUsername];
            if (!user) return;

            const choice = prompt('Выберите действие:\n1 - Сменить ник\n2 - Сменить пароль\n3 - Выйти из аккаунта');
            if (choice === '1') {
                const newUsername = prompt('Введите новый ник:', currentUsername);
                if (newUsername && newUsername.trim() !== '' && newUsername.trim() !== currentUsername) {
                    if (users[newUsername.trim()]) {
                        alert('Пользователь с таким именем уже существует!');
                        return;
                    }
                    users[newUsername.trim()] = { ...user };
                    delete users[currentUsername];
                    currentUsername = newUsername.trim();
                    setCurrentUser(currentUsername);
                    saveUsers(users);
                    updateProfileUI();
                    alert('✅ Ник изменён!');
                }
            } else if (choice === '2') {
                const newPassword = prompt('Введите новый пароль:');
                if (newPassword && newPassword.trim() !== '') {
                    const users2 = getUsers();
                    users2[currentUsername].password = newPassword.trim();
                    saveUsers(users2);
                    alert('✅ Пароль изменён!');
                }
            } else if (choice === '3') {
                logoutUser();
            }
        }

        // ---- КЛИК ----
        function clickHandler(event) {
            const bonus = state.clickBonus || 0;
            const gain = (0.5 + bonus) * state.clickMultiplier * state.prestigeBonus;
            state.money += gain;
            state.totalClicks++;
            state.totalMoneyEarned += gain;

            const x = event.clientX || window.innerWidth/2;
            const y = event.clientY || window.innerHeight/2;
            showFloatingText(x, y, `+${gain.toFixed(1)}💰`);

            if (Math.random() < 0.05 + state.goldenSeedChance) {
                const bonusGain = gain * 3;
                state.money += bonusGain;
                showFloatingText(x + 40, y - 30, `✨+${bonusGain.toFixed(1)}✨`);
            }

            updateUI();
            checkAchievements();
            savePlayerState();
        }

        function showFloatingText(x, y, text) {
            const el = document.createElement('div');
            el.className = 'click-float';
            el.textContent = text;
            el.style.left = (x - 30) + 'px';
            el.style.top = (y - 20) + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1000);
        }

        // ---- ПОКУПКА СЕМЕНИ ----
        function buySeed(seedId) {
            if (state.seedInventory[seedId] === 1) return;
            const price = getSeedPrice(seedId);
            if (state.money < price) return;
            state.money -= price;
            state.seedInventory[seedId] = 1;
            state.seeds++;

            const seed = ALL_SEEDS[seedId];
            state.clickBonus += seed.bonus;

            updateUI();
            checkAchievements();
            savePlayerState();
        }

        // ---- ПРОПУСТИТЬ ДЕНЬ ----
        function skipDay() {
            const price = 50 + state.daySkipCount * 10;
            if (state.money < price) {
                alert(`Нужно ${price}💰 для пропуска дня`);
                return;
            }
            state.money -= price;
            state.daySkipCount++;
            state.growth = Math.min(100, state.growth + 10);
            const bonus = 2 + state.daySkipCount * 0.5;
            state.money += bonus;
            showFloatingText(window.innerWidth/2, window.innerHeight/2, `📈 +10% рост! +${bonus.toFixed(1)}💰`);
            updateUI();
            savePlayerState();
        }

        // ---- ПЕРЕРОЖДЕНИЕ ----
        function doPrestige() {
            const required = 1000 * Math.pow(2, state.prestigeLevel);
            if (state.totalMoneyEarned < required) {
                alert(`Нужно заработать ${Math.floor(required)}💰`);
                return;
            }
            if (!confirm(`Переродиться? Бонус +${(state.prestigeLevel + 1) * 0.5}x`)) return;

            state.prestigeLevel++;
            state.prestigeBonus = 1 + (state.prestigeLevel * 0.5);
            state.seedInventory = {};
            state.seeds = 0;
            state.autoClickers = 0;
            state.autoClickLevel = 1;
            state.clickMultiplier = 1 + state.prestigeLevel * 0.1;
            state.clickBonus = 0;
            state.growth = 0;
            state.daySkipCount = 0;
            updateUI();
            checkAchievements();
            savePlayerState();
            alert(`✨ Перерождение! Бонус: x${state.prestigeBonus.toFixed(1)}`);
        }

        function checkAchievements() {
            ACHIEVEMENTS.forEach(a => {
                if (!state.achievements.includes(a.id) && a.check()) {
                    state.achievements.push(a.id);
                    setTimeout(() => alert(`🏆 ${a.name}!\n${a.desc}`), 300);
                }
            });
        }

        // ---- ОБНОВЛЕНИЕ UI ----
        function updateUI() {
            document.getElementById('money').textContent = Math.floor(state.money);
            document.getElementById('seeds').textContent = state.seeds;
            const cps = state.autoClickers * 0.5 * state.autoClickLevel * state.prestigeBonus;
            document.getElementById('cps').textContent = cps.toFixed(1);
            updateProfileUI();

            const shop = document.getElementById('shopContainer');
            shop.innerHTML = '';
            ALL_SEEDS.forEach(seed => {
                const price = getSeedPrice(seed.id);
                const owned = state.seedInventory[seed.id] === 1;
                const btn = document.createElement('button');
                btn.className = 'shop-btn' + (owned ? ' bought' : '') + (state.money < price || owned ? ' disabled' : '');
                btn.innerHTML = `${seed.emoji} ${seed.name}
                    <span class="price">💰 ${price}</span>
                    <span class="bonus">+${seed.bonus}💰</span>
                    <span class="owned">${owned ? '✅ Куплено' : ''}</span>`;
                btn.onclick = () => buySeed(seed.id);
                shop.appendChild(btn);
            });

            document.getElementById('prestigeBtn').textContent = `✨ Перерождение (${Math.floor(1000 * Math.pow(2, state.prestigeLevel))}💰)`;

            const list = document.getElementById('seedList');
            list.innerHTML = '';
            ALL_SEEDS.forEach(seed => {
                const owned = state.seedInventory[seed.id] === 1;
                if (owned || seed.tier <= 3) {
                    const div = document.createElement('div');
                    div.className = 'seed-item';
                    div.innerHTML = `<span class="sname">${seed.emoji} ${seed.name}</span>
                        <span class="sprice">💰 ${getSeedPrice(seed.id)}</span>
                        <span class="sbonus">${owned ? '✅' : '+' + seed.bonus + '💰'}</span>`;
                    list.appendChild(div);
                }
            });

            document.getElementById('achievementDisplay').textContent = `🏅 Достижения: ${state.achievements.length}/${ACHIEVEMENTS.length}`;
        }

        // ---- ВКЛАДКИ ----
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                if (this.id === 'minigameBtn') {
                    if (!currentUsername) {
                        alert('Сначала войдите в аккаунт!');
                        return;
                    }
                    startMinigame();
                    return;
                }
                if (this.id === 'profileBtn') {
                    if (!currentUsername) {
                        alert('Вы не авторизованы!');
                        return;
                    }
                    showProfileSettings();
                    return;
                }
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                document.getElementById('tab-' + this.dataset.tab).classList.add('active');
            });
        });

        // ---- АВТОКЛИКЕР ----
        function gameTick() {
            const cps = state.autoClickers * 0.5 * state.autoClickLevel * state.prestigeBonus;
            if (cps > 0) {
                state.money += cps / 10;
                state.totalMoneyEarned += cps / 10;
                updateUI();
                checkAchievements();
            }
        }

        // ============================================================
        //  МИНИ-ИГРА: СУБВЕЙ САД (Subway Surfers стиль)
        // ============================================================
        let minigameRunning = false;
        let minigameTimer = 120;
        let minigameInterval = null;
        let minigameScore = 0;
        let mgPlayer = { x: 0, y: 0 };
        let mgEnemy = { x: 0, y: 0 };
        let obstacles = [];
        let particles = [];
        const MG_SIZE = 28;
        const PLAYER_SPEED = 4;
        let mgCanvas, mgCtx, mgWidth, mgHeight;
        let mgTouchId = null;
        let mgTouchX = 0, mgTouchY = 0;
        let frameCount = 0;
        let obstacleTimer = 0;

        function startMinigame() {
            const overlay = document.getElementById('minigameOverlay');
            overlay.classList.add('active');
            document.getElementById('minigameResult').textContent = '';
            document.getElementById('minigameScore').textContent = '🏆 Очки: 0';
            minigameTimer = 120;
            minigameScore = 0;
            minigameRunning = true;
            obstacles = [];
            particles = [];
            frameCount = 0;
            obstacleTimer = 0;
            updateMinigameTimer();

            mgCanvas = document.getElementById('minigameCanvas');
            const rect = mgCanvas.parentElement.getBoundingClientRect();
            mgCanvas.width = rect.width;
            mgCanvas.height = rect.height;
            mgCtx = mgCanvas.getContext('2d');
            mgWidth = mgCanvas.width;
            mgHeight = mgCanvas.height;

            mgPlayer = { x: mgWidth/2, y: mgHeight - 80 };
            mgEnemy = { x: mgWidth/2, y: 50 };

            if (minigameInterval) clearInterval(minigameInterval);
            minigameInterval = setInterval(() => {
                minigameTimer--;
                updateMinigameTimer();
                if (minigameTimer <= 0) {
                    endMinigame(true);
                }
            }, 1000);

            const joystickArea = document.getElementById('joystickArea');
            joystickArea.addEventListener('touchstart', mgTouchStart, { passive: false });
            joystickArea.addEventListener('touchmove', mgTouchMove, { passive: false });
            joystickArea.addEventListener('touchend', mgTouchEnd, { passive: false });

            // Для мыши (ПК)
            joystickArea.addEventListener('mousemove', mgMouseMove);
            joystickArea.addEventListener('mouseleave', () => { mgTouchX = 0; mgTouchY = 0; });

            requestAnimationFrame(gameLoop);
        }

        function updateMinigameTimer() {
            const mins = Math.floor(minigameTimer / 60);
            const secs = minigameTimer % 60;
            document.getElementById('minigameTimer').textContent = `⏱️ ${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function mgTouchStart(e) {
            e.preventDefault();
            const touch = e.touches[0];
            if (!touch) return;
            mgTouchId = touch.identifier;
            mgTouchX = touch.clientX;
            mgTouchY = touch.clientY;
        }

        function mgTouchMove(e) {
            e.preventDefault();
            const touch = Array.from(e.touches).find(t => t.identifier === mgTouchId);
            if (!touch) return;
            mgTouchX = touch.clientX;
            mgTouchY = touch.clientY;
        }

        function mgTouchEnd(e) {
            mgTouchId = null;
            mgTouchX = 0;
            mgTouchY = 0;
        }

        function mgMouseMove(e) {
            const rect = mgCanvas.getBoundingClientRect();
            const isOver = e.clientX >= rect.left && e.clientX <= rect.right &&
                           e.clientY >= rect.top && e.clientY <= rect.bottom;
            if (isOver) {
                mgTouchX = e.clientX;
                mgTouchY = e.clientY;
            } else {
                mgTouchX = 0;
                mgTouchY = 0;
            }
        }

        function getJoystickDir() {
            if (!mgTouchX || !mgTouchY) return { x: 0, y: 0 };
            const rect = mgCanvas.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const dx = (mgTouchX - centerX) / (rect.width / 2);
            const dy = (mgTouchY - centerY) / (rect.height / 2);
            const len = Math.sqrt(dx*dx + dy*dy);
            if (len > 1) {
                return { x: dx / len, y: dy / len };
            }
            return { x: dx, y: dy };
        }

        function gameLoop() {
            if (!minigameRunning) return;
            frameCount++;
            updateGame();
            drawGame();
            requestAnimationFrame(gameLoop);
        }

        function updateGame() {
            // Управление через джойстик
            const dir = getJoystickDir();
            if (Math.abs(dir.x) > 0.1 || Math.abs(dir.y) > 0.1) {
                mgPlayer.x += dir.x * PLAYER_SPEED;
                mgPlayer.y += dir.y * PLAYER_SPEED;
            }

            // Стены — не выходить за поле
            const margin = MG_SIZE / 2 + 5;
            mgPlayer.x = Math.max(margin, Math.min(mgWidth - margin, mgPlayer.x));
            mgPlayer.y = Math.max(margin, Math.min(mgHeight - margin, mgPlayer.y));

            // Враг (Cool Kid) бежит за игроком
            const dx = mgPlayer.x - mgEnemy.x;
            const dy = mgPlayer.y - mgEnemy.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist > 1) {
                const speed = 0.8 + (120 - minigameTimer) / 200;
                mgEnemy.x += (dx / dist) * Math.min(speed, 2.5);
                mgEnemy.y += (dy / dist) * Math.min(speed, 2.5);
            }
            mgEnemy.x = Math.max(MG_SIZE/2, Math.min(mgWidth - MG_SIZE/2, mgEnemy.x));
            mgEnemy.y = Math.max(MG_SIZE/2, Math.min(mgHeight - MG_SIZE/2, mgEnemy.y));

            // Генерация препятствий
            obstacleTimer++;
            if (obstacleTimer > 30 + Math.random() * 30) {
                obstacleTimer = 0;
                const side = Math.random();
                let x, y;
                if (side < 0.33) {
                    x = MG_SIZE;
                    y = Math.random() * mgHeight;
                } else if (side < 0.66) {
                    x = mgWidth - MG_SIZE;
                    y = Math.random() * mgHeight;
                } else {
                    x = Math.random() * mgWidth;
                    y = MG_SIZE;
                }
                obstacles.push({
                    x: x,
                    y: y,
                    size: 18 + Math.random() * 20,
                    speed: 0.5 + Math.random() * 0.8,
                    angle: Math.random() * Math.PI * 2,
                    type: Math.floor(Math.random() * 3)
                });
            }

            // Движение препятствий (плывут к игроку)
            obstacles.forEach(obs => {
                const dx2 = mgPlayer.x - obs.x;
                const dy2 = mgPlayer.y - obs.y;
                const dist2 = Math.sqrt(dx2*dx2 + dy2*dy2);
                if (dist2 > 1) {
                    obs.x += (dx2 / dist2) * obs.speed * 0.5;
                    obs.y += (dy2 / dist2) * obs.speed * 0.5;
                }
            });

            // Проверка столкновения с препятствиями
            obstacles = obstacles.filter(obs => {
                const dx2 = mgPlayer.x - obs.x;
                const dy2 = mgPlayer.y - obs.y;
                const dist2 = Math.sqrt(dx2*dx2 + dy2*dy2);
                if (dist2 < MG_SIZE/2 + obs.size/2) {
                    return false; // столкновение — удаляем препятствие
                }
                // Если препятствие улетело далеко — удаляем
                if (Math.abs(obs.x) > mgWidth + 50 || Math.abs(obs.y) > mgHeight + 50) {
                    return false;
                }
                return true;
            });

            // Проверка столкновения с Cool Kid
            const dx3 = mgPlayer.x - mgEnemy.x;
            const dy3 = mgPlayer.y - mgEnemy.y;
            const dist3 = Math.sqrt(dx3*dx3 + dy3*dy3);
            if (dist3 < MG_SIZE) {
                endMinigame(false);
                return;
            }

            // Очки за время
            if (frameCount % 30 === 0) {
                minigameScore++;
                document.getElementById('minigameScore').textContent = `🏆 Очки: ${minigameScore}`;
            }

            // Эффекты
            if (frameCount % 10 === 0) {
                particles.push({
                    x: mgPlayer.x + (Math.random() - 0.5) * 20,
                    y: mgPlayer.y + (Math.random() - 0.5) * 20,
                    life: 20 + Math.random() * 20,
                    maxLife: 30 + Math.random() * 20,
                    size: 2 + Math.random() * 4,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: (Math.random() - 0.5) * 0.5,
                    color: Math.random() > 0.5 ? '#6ab04a' : '#ffd700'
                });
            }

            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                return p.life > 0;
            });
        }

        function drawGame() {
            mgCtx.clearRect(0, 0, mgWidth, mgHeight);
            
            // Пол
            mgCtx.fillStyle = '#1a1a2e';
            mgCtx.fillRect(0, 0, mgWidth, mgHeight);
            
            // Клетки (эффект дороги)
            for (let i = 0; i < mgWidth; i += 40) {
                for (let j = 0; j < mgHeight; j += 40) {
                    mgCtx.fillStyle = (i/40 + j/40) % 2 === 0 ? '#222244' : '#1a1a36';
                    mgCtx.fillRect(i, j, 40, 40);
                }
            }

            // Препятствия
            obstacles.forEach(obs => {
                const colors = ['#ff6b6b', '#ffd93d', '#6bcb77'];
                mgCtx.shadowColor = colors[obs.type] || '#ff6b6b';
                mgCtx.shadowBlur = 15;
                mgCtx.fillStyle = colors[obs.type] || '#ff6b6b';
                mgCtx.beginPath();
                if (obs.type === 0) {
                    // Квадрат
                    mgCtx.fillRect(obs.x - obs.size/2, obs.y - obs.size/2, obs.size, obs.size);
                } else if (obs.type === 1) {
                    // Круг
                    mgCtx.arc(obs.x, obs.y, obs.size/2, 0, Math.PI*2);
                    mgCtx.fill();
                } else {
                    // Треугольник
                    mgCtx.moveTo(obs.x, obs.y - obs.size/2);
                    mgCtx.lineTo(obs.x - obs.size/2, obs.y + obs.size/2);
                    mgCtx.lineTo(obs.x + obs.size/2, obs.y + obs.size/2);
                    mgCtx.closePath();
                    mgCtx.fill();
                }
                mgCtx.shadowBlur = 0;
                // Эмодзи на препятствии
                mgCtx.font = '14px sans-serif';
                mgCtx.textAlign = 'center';
                mgCtx.textBaseline = 'middle';
                mgCtx.fillStyle = '#fff';
                const emojis = ['🧱', '🚧', '⛔'];
                mgCtx.fillText(emojis[obs.type] || '🧱', obs.x, obs.y);
            });

            // Игрок (фермер)
            mgCtx.shadowColor = '#4a9a4a';
            mgCtx.shadowBlur = 25;
            mgCtx.fillStyle = '#6ab04a';
            mgCtx.beginPath();
            mgCtx.arc(mgPlayer.x, mgPlayer.y, MG_SIZE/2, 0, Math.PI*2);
            mgCtx.fill();
            mgCtx.shadowBlur = 0;
            mgCtx.font = '22px sans-serif';
            mgCtx.textAlign = 'center';
            mgCtx.textBaseline = 'middle';
            mgCtx.fillStyle = '#fff';
            mgCtx.fillText('🧑‍🌾', mgPlayer.x, mgPlayer.y);

            // Cool Kid (враг)
            mgCtx.shadowColor = '#ff4444';
            mgCtx.shadowBlur = 30;
            mgCtx.fillStyle = '#cc2222';
            mgCtx.beginPath();
            mgCtx.arc(mgEnemy.x, mgEnemy.y, MG_SIZE/2, 0, Math.PI*2);
            mgCtx.fill();
            mgCtx.shadowBlur = 0;
            mgCtx.font = '22px sans-serif';
            mgCtx.textAlign = 'center';
            mgCtx.textBaseline = 'middle';
            mgCtx.fillStyle = '#fff';
            mgCtx.fillText('😎', mgEnemy.x, mgEnemy.y);
            mgCtx.font = '9px sans-serif';
            mgCtx.fillStyle = '#ff6666';
            mgCtx.fillText('COOL KID', mgEnemy.x, mgEnemy.y - MG_SIZE/2 - 10);

            // Частицы
            particles.forEach(p => {
                const alpha = p.life / p.maxLife;
                mgCtx.globalAlpha = alpha;
                mgCtx.fillStyle = p.color;
                mgCtx.beginPath();
                mgCtx.arc(p.x, p.y, p.size * alpha, 0, Math.PI*2);
                mgCtx.fill();
                mgCtx.globalAlpha = 1;
            });

            // Стены (рамка)
            mgCtx.strokeStyle = '#4a6a9a';
            mgCtx.lineWidth = 4;
            mgCtx.strokeRect(2, 2, mgWidth - 4, mgHeight - 4);
            mgCtx.strokeStyle = '#3a5a7a';
            mgCtx.lineWidth = 2;
            mgCtx.setLineDash([8, 8]);
            mgCtx.strokeRect(6, 6, mgWidth - 12, mgHeight - 12);
            mgCtx.setLineDash([]);
        }

        function endMinigame(win) {
            if (!minigameRunning) return;
            minigameRunning = false;
            if (minigameInterval) clearInterval(minigameInterval);
            document.getElementById('minigameTimer').textContent = win ? '🎉 ПОБЕДА!' : '💀 ТЕБЯ ПОЙМАЛИ!';
            const result = document.getElementById('minigameResult');
            if (win) {
                const reward = 5 + state.prestigeLevel * 2 + Math.floor(minigameScore / 10);
                state.money += reward;
                state.totalMoneyEarned += reward;
                state.minigameWins++;
                result.textContent = `🏆 +${reward}💰 за победу!`;
                result.style.color = '#ffd700';
            } else {
                const reward = Math.floor(minigameScore / 20) + 1;
                state.money += reward;
                state.totalMoneyEarned += reward;
                result.textContent = `😵 Попробуй ещё раз! +${reward}💰 утешительный приз.`;
                result.style.color = '#ff6b6b';
            }
            updateUI();
            checkAchievements();
            savePlayerState();
        }

        // ---- СОБЫТИЯ ИГРЫ ----

        document.getElementById('autoClickBtn').addEventListener('click', () => {

        document.getElementById('resetBtn').addEventListener('click', () => {

            if (confirm('Сбросить весь прогресс?')) {
                state = {
                    money: 0, seeds: 0, prestigeLevel: 0, prestigeBonus: 1,
                    autoClickers: 0, autoClickLevel: 1, totalClicks: 0,
                    totalMoneyEarned: 0, achievements: [], seedInventory: {},
                    clickMultiplier: 1, goldenSeedChance: 0, clickBonus: 0,
                    growth: 0, minigameWins: 0, daySkipCount: 0,
                };
                savePlayerState();
                updateUI();
                alert('Прогресс сброшен!');
            }
        });

        setInterval(() => savePlayerState(), 15000);
        setInterval(gameTick, 100);

        console.log('🌱 Сад-Кликер с Subway Surfers мини-игрой!');
        console.log('👤 Текущий пользователь:', currentUsername || 'Гость');
    </script>
