<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌱 Сад-Кликер</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            background: linear-gradient(145deg, #0f1f0f, #1e3a1e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 10px;
        }
        .game {
            background: #2d5a2d;
            border-radius: 40px;
            padding: 16px;
            max-width: 440px;
            width: 100%;
            border: 3px solid #4d8a4d;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            min-height: 600px;
            position: relative;
        }
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 3px;
            background: #1f3f1f;
            padding: 6px 8px;
            border-radius: 28px;
            margin-bottom: 6px;
            border: 2px solid #4d7a4d;
        }
        .stat-item { color: #e8f5d0; font-weight: bold; font-size: 9px; text-align: center; }
        .stat-item span { color: #ffd700; font-size: 13px; display: block; }

        .center-area { flex: 1; display: flex; justify-content: center; align-items: center; min-height: 160px; padding: 6px 0; }
        .click-btn {
            width: 150px; height: 150px; border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #6ab04a, #1f4a1f);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; border: 4px solid #8fc98f;
            box-shadow: 0 8px 0 #0f2a0f, 0 12px 30px rgba(0,0,0,0.6);
            transition: all 0.08s ease;
        }
        .click-btn:active { transform: translateY(6px); box-shadow: 0 2px 0 #0f2a0f, 0 8px 20px rgba(0,0,0,0.5); }
        .click-emoji { font-size: 56px; line-height: 1; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3)); }
        .click-btn:active .click-emoji { transform: scale(0.8); }
        .click-hint { color: #d4ecd4; font-size: 11px; margin-top: 2px; font-weight: bold; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }

        .click-float {
            position: fixed; font-weight: bold; font-size: 28px; color: #ffd700;
            text-shadow: 0 0 20px #ffa500, 0 0 40px #ff6600;
            pointer-events: none; animation: floatUp 1s ease-out forwards; z-index: 999;
        }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-120px) scale(1.5); } }

        .bottom-section { flex-shrink: 0; margin-top: 4px; }
        .tab-bar {
            display: grid; grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 4px; margin: 4px 0 6px 0;
        }
        .tab-btn {
            background: #1f3f1f; color: #8aaa8a; border: 2px solid #3d6a3d;
            padding: 5px 0; border-radius: 14px; cursor: pointer;
            font-weight: bold; font-size: 9px; transition: all 0.12s;
        }
        .tab-btn.active { background: #3d7a3d; color: #f0f7d0; border-color: #6fbf6f; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .shop {
            display: grid; grid-template-columns: 1fr 1fr 1fr;
            gap: 3px; margin: 3px 0; max-height: 180px; overflow-y: auto;
        }
        .shop::-webkit-scrollbar { width: 3px; }
        .shop::-webkit-scrollbar-thumb { background: #4d8a4d; border-radius: 8px; }
        .shop-btn {
            background: #1f4a1f; color: #e8f5d0; border: 2px solid #4d8a4d;
            padding: 3px 2px; border-radius: 10px; font-weight: bold;
            font-size: 8px; cursor: pointer; transition: all 0.12s;
            text-align: center; line-height: 1.1;
        }
        .shop-btn:active { transform: scale(0.92); background: #123012; }
        .shop-btn.disabled { opacity: 0.4; filter: grayscale(0.7); pointer-events: none; }
        .shop-btn .price { color: #ffd700; display: block; font-size: 7px; }
        .shop-btn .owned { color: #7fbf7f; display: block; font-size: 7px; }
        .shop-btn .bonus { color: #6fcfcf; display: block; font-size: 7px; }
        .shop-btn.bought { border-color: #ffd700; background: #2a5a2a; }

        .actions {
            display: grid; grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 3px; margin-top: 4px;
        }
        .action-btn {
            background: #8f7a3a; color: #1e2a1e; border: none;
            padding: 5px 0; border-radius: 14px; font-weight: bold;
            font-size: 8px; cursor: pointer; border: 2px solid #c4a84a;
            transition: all 0.12s;
        }
        .action-btn:active { transform: scale(0.92); background: #6f5f2a; }
        .action-btn.danger { background: #7a3a3a; border-color: #aa5a5a; color: #f0d0d0; }
        .action-btn.gold { background: #c49a3a; border-color: #eac464; }
        .action-btn.minigame { background: #4a6a9a; border-color: #6a9aca; color: #f0f7ff; }
        .action-btn.minigame:active { background: #2a4a7a; }
        .action-btn.green { background: #3a8a3a; border-color: #5aaa5a; }

        .seed-list {
            background: #1a3a1a; border-radius: 12px; padding: 6px;
            max-height: 90px; overflow-y: auto; margin-top: 4px;
            border: 2px solid #3d6a3d;
        }
        .seed-list::-webkit-scrollbar { width: 3px; }
        .seed-list::-webkit-scrollbar-thumb { background: #4d8a4d; border-radius: 8px; }
        .seed-item {
            display: flex; justify-content: space-between; padding: 2px 4px;
            color: #cde0cd; font-size: 8px; border-bottom: 1px solid #2a4a2a;
        }
        .seed-item .sname { color: #ffd700; }
        .seed-item .sprice { color: #7fbf7f; }
        .seed-item .sbonus { color: #6fcfcf; }

        .footer { color: #8aaa8a; text-align: center; font-size: 8px; margin-top: 3px; }

        /* ===== МИНИ-ИГРА ===== */
        .minigame-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: #0a0a1a; z-index: 1000; display: none;
            flex-direction: column; align-items: center; justify-content: center;
            padding: 20px;
        }
        .minigame-overlay.active { display: flex; }
        .minigame-header { color: #fff; font-size: 16px; font-weight: bold; margin-bottom: 6px; text-align: center; }
        .minigame-canvas-wrap {
            position: relative; background: #1a1a2e; border-radius: 20px;
            border: 3px solid #4a6a9a; width: 100%; max-width: 360px;
            aspect-ratio: 1 / 1; touch-action: none;
        }
        .minigame-canvas-wrap canvas { width: 100%; height: 100%; border-radius: 18px; display: block; touch-action: none; }
        .minigame-timer { color: #ff6b6b; font-size: 24px; font-weight: bold; margin: 6px 0; text-shadow: 0 0 20px rgba(255,0,0,0.5); }
        .minigame-close {
            background: #7a3a3a; color: #fff; border: none;
            padding: 8px 24px; border-radius: 24px; font-size: 14px;
            font-weight: bold; cursor: pointer; margin-top: 6px;
            border: 2px solid #aa5a5a;
        }
        .minigame-close:active { transform: scale(0.92); background: #5a2a2a; }
        .minigame-result { color: #ffd700; font-size: 18px; font-weight: bold; margin: 4px 0; text-align: center; }
    </style>
</head>
<body>
    <div class="game">
        <div class="stats">
            <div class="stat-item">💰 <span id="money">0</span></div>
            <div class="stat-item">🌱 <span id="seeds">0</span></div>
            <div class="stat-item">⚡ <span id="cps">0</span></div>
            <div class="stat-item">📈 <span id="growth">0%</span></div>
        </div>

        <div class="center-area">
            <div class="click-btn" id="clickBtn">
                <div class="click-emoji">🧑‍🌾</div>
                <div class="click-hint">👆 Тапай!</div>
            </div>
        </div>

        <div class="bottom-section">
            <div class="tab-bar">
                <button class="tab-btn active" data-tab="shop">🏪 Магазин</button>
                <button class="tab-btn" data-tab="seeds">🌱 Семена</button>
                <button class="tab-btn minigame" id="minigameBtn">🎮 Игра</button>
                <button class="tab-btn" data-tab="actions">⚡ Действия</button>
            </div>

            <div class="tab-content active" id="tab-shop">
                <div class="shop" id="shopContainer"></div>
            </div>

            <div class="tab-content" id="tab-seeds">
                <div class="seed-list" id="seedList"></div>
            </div>

            <div class="tab-content" id="tab-actions">
                <div class="actions">
                    <button class="action-btn gold" id="prestigeBtn">✨ Перерождение</button>
                    <button class="action-btn" id="autoClickBtn">🤖 Автокликер</button>
                    <button class="action-btn green" id="skipDayBtn">⏭️ Пропустить день</button>
                    <button class="action-btn danger" id="resetBtn">🔄 Сброс</button>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-top: 4px;">
                    <button class="action-btn" id="waterBtn">💧 Полив (+1💰)</button>
                    <button class="action-btn" id="fertilizeBtn">🧪 Удобрение (+2💰)</button>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-top: 4px;">
                    <button class="action-btn" id="harvestBtn">🧺 Сбор урожая (+1.5💰)</button>
                    <button class="action-btn" id="plantBtn">🌱 Посадка (+1💰)</button>
                </div>
            </div>

            <div class="footer" id="achievementDisplay">🏅 Достижения: 0</div>
        </div>
    </div>

    <!-- ===== МИНИ-ИГРА ===== -->
    <div class="minigame-overlay" id="minigameOverlay">
        <div class="minigame-header">🏃 УБЕГИ ОТ COOL KID!</div>
        <div class="minigame-timer" id="minigameTimer">⏱️ 2:00</div>
        <div class="minigame-result" id="minigameResult"></div>
        <div class="minigame-canvas-wrap">
            <canvas id="minigameCanvas"></canvas>
        </div>
        <button class="minigame-close" id="minigameClose">🚪 Выйти</button>
    </div>

    <script>
        // ============================================================
        //  ОСНОВНАЯ ИГРА
        // ============================================================

        let state = {
            money: 0,
            seeds: 0,
            prestigeLevel: 0,
            prestigeBonus: 1,
            autoClickers: 0,
            autoClickLevel: 1,
            totalClicks: 0,
            totalMoneyEarned: 0,
            achievements: [],
            seedInventory: {}, // 1 = куплено
            clickMultiplier: 1,
            goldenSeedChance: 0,
            clickBonus: 0,
            growth: 0,
            minigameWins: 0,
            daySkipCount: 0,
        };

        // ---- ГЕНЕРАЦИЯ 80 СЕМЯН (1 РАЗ) ----
        function generateSeeds() {
            const seeds = [];
            const names = [
                'Помидор', 'Огурец', 'Морковь', 'Картофель', 'Лук', 'Чеснок', 'Капуста', 'Свекла',
                'Репа', 'Редис', 'Тыква', 'Кабачок', 'Баклажан', 'Перец', 'Горох', 'Фасоль',
                'Кукуруза', 'Пшеница', 'Рожь', 'Овес', 'Гречиха', 'Рис', 'Ячмень', 'Просо',
                'Подсолнух', 'Клубника', 'Малина', 'Смородина', 'Крыжовник', 'Ежевика', 'Голубика', 'Брусника',
                'Арбуз', 'Дыня', 'Абрикос', 'Персик', 'Слива', 'Вишня', 'Черешня', 'Груша',
                'Яблоня', 'Айва', 'Гранат', 'Инжир', 'Финик', 'Банан', 'Манго', 'Ананас',
                'Папайя', 'Гуава', 'Маракуйя', 'Киви', 'Личи', 'Рамбутан', 'Дуриан', 'Джекфрут',
                'Кокос', 'Миндаль', 'Фисташка', 'Кешью', 'Грецкий', 'Фундук', 'Каштан', 'Пекан',
                'Арахис', 'Бобы', 'Чечевица', 'Нут', 'Соя', 'Кунжут', 'Лен', 'Чиа',
                'Базилик', 'Укроп', 'Петрушка', 'Кинза', 'Мята', 'Розмарин', 'Тимьян', 'Орегано'
            ];
            let basePrice = 5;
            for (let i = 0; i < 80; i++) {
                const tier = Math.floor(i / 10) + 1;
                const bonus = Math.min(0.05 + (tier - 1) * 0.05, 0.2);
                seeds.push({
                    id: i,
                    name: names[i % names.length] + (i >= names.length ? ` ${Math.floor(i/names.length)+1}` : ''),
                    basePrice: Math.floor(basePrice * (1.2 + (tier * 0.1))),
                    tier: tier,
                    bonus: Math.round(bonus * 100) / 100,
                    emoji: ['🌱','🍅','🥒','🥕','🥔','🧅','🧄','🥬','🌿','🌻','🍓','🍉','🍇','🍊','🍑','🥭','🍍','🥝','🍒','🍎'][i % 20] || '🌿'
                });
                basePrice *= 1.05 + (i / 300);
            }
            return seeds;
        }
        const ALL_SEEDS = generateSeeds();

        function getSeedPrice(seedId) {
            const seed = ALL_SEEDS[seedId];
            return seed.basePrice;
        }

        const ACHIEVEMENTS = [
            { id: 'first_click', name: 'Первый шаг', desc: 'Сделать 1 клик', check: () => state.totalClicks >= 1 },
            { id: 'click_100', name: 'Трудяга', desc: 'Сделать 100 кликов', check: () => state.totalClicks >= 100 },
            { id: 'click_1000', name: 'Кликер-мастер', desc: 'Сделать 1000 кликов', check: () => state.totalClicks >= 1000 },
            { id: 'money_100', name: 'Первые деньги', desc: 'Заработать 100💰', check: () => state.totalMoneyEarned >= 100 },
            { id: 'money_1000', name: 'Инвестор', desc: 'Заработать 1000💰', check: () => state.totalMoneyEarned >= 1000 },
            { id: 'money_10000', name: 'Магнат', desc: 'Заработать 10000💰', check: () => state.totalMoneyEarned >= 10000 },
            { id: 'seeds_10', name: 'Садовод', desc: 'Купить 10 семян', check: () => Object.values(state.seedInventory).filter(v=>v===1).length >= 10 },
            { id: 'seeds_30', name: 'Агроном', desc: 'Купить 30 семян', check: () => Object.values(state.seedInventory).filter(v=>v===1).length >= 30 },
            { id: 'seeds_50', name: 'Земледелец', desc: 'Купить 50 семян', check: () => Object.values(state.seedInventory).filter(v=>v===1).length >= 50 },
            { id: 'prestige_1', name: 'Возрождение', desc: 'Сделать 1 перерождение', check: () => state.prestigeLevel >= 1 },
            { id: 'prestige_5', name: 'Философ', desc: 'Сделать 5 перерождений', check: () => state.prestigeLevel >= 5 },
            { id: 'auto_10', name: 'Автоматизация', desc: 'Купить 10 автокликеров', check: () => state.autoClickers >= 10 },
            { id: 'minigame_win', name: 'Побег', desc: 'Выиграть в мини-игре', check: () => state.minigameWins >= 1 },
            { id: 'growth_100', name: 'Рост', desc: 'Достичь 100% роста', check: () => state.growth >= 100 },
        ];

        // ---- КЛИК ----
        function clickHandler(event) {
            const bonus = state.clickBonus || 0;
            const gain = (0.5 + bonus) * state.clickMultiplier * state.prestigeBonus;
            state.money += gain;
            state.totalClicks++;
            state.totalMoneyEarned += gain;

            const x = event.clientX || window.innerWidth/2;
            const y = event.clientY || window.innerHeight/2;
            showFloatingText(x, y, `+${gain.toFixed(1)}💰`);

            if (Math.random() < 0.05 + state.goldenSeedChance) {
                const bonusGain = gain * 3;
                state.money += bonusGain;
                showFloatingText(x + 40, y - 30, `✨+${bonusGain.toFixed(1)}✨`);
            }

            updateUI();
            checkAchievements();
            saveGame();
        }

        function showFloatingText(x, y, text) {
            const el = document.createElement('div');
            el.className = 'click-float';
            el.textContent = text;
            el.style.left = (x - 30) + 'px';
            el.style.top = (y - 20) + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1000);
        }

        // ---- ПОКУПКА СЕМЕНИ (1 РАЗ) ----
        function buySeed(seedId) {
            if (state.seedInventory[seedId] === 1) return; // уже куплено
            const price = getSeedPrice(seedId);
            if (state.money < price) return;
            state.money -= price;
            state.seedInventory[seedId] = 1;
            state.seeds++;

            const seed = ALL_SEEDS[seedId];
            state.clickBonus += seed.bonus;

            updateUI();
            checkAchievements();
            saveGame();
        }

        // ---- ПРОПУСТИТЬ ДЕНЬ ----
        function skipDay() {
            const price = 50 + state.daySkipCount * 10;
            if (state.money < price) {
                alert(`Нужно ${price}💰 для пропуска дня`);
                return;
            }
            state.money -= price;
            state.daySkipCount++;
            state.growth = Math.min(100, state.growth + 10);
            // Бонус к деньгам за пропуск
            const bonus = 2 + state.daySkipCount * 0.5;
            state.money += bonus;
            showFloatingText(window.innerWidth/2, window.innerHeight/2, `📈 +10% рост! +${bonus.toFixed(1)}💰`);
            updateUI();
            saveGame();
        }

        // ---- ДЕЙСТВИЯ (маленький доход) ----
        function doAction(name, amount, cost = 0) {
            if (state.money < cost) { alert(`Нужно ${cost}💰`); return; }
            state.money -= cost;
            state.money += amount;
            state.totalMoneyEarned += amount;
            showFloatingText(window.innerWidth/2, window.innerHeight/2 - 50, `+${amount}💰`);
            updateUI();
            saveGame();
        }

        // ---- ПЕРЕРОЖДЕНИЕ ----
        function doPrestige() {
            const required = 1000 * Math.pow(2, state.prestigeLevel);
            if (state.totalMoneyEarned < required) {
                alert(`Нужно заработать ${Math.floor(required)}💰`);
                return;
            }
            if (!confirm(`Переродиться? Бонус +${(state.prestigeLevel + 1) * 0.5}x`)) return;

            state.prestigeLevel++;
            state.prestigeBonus = 1 + (state.prestigeLevel * 0.5);
            state.seedInventory = {};
            state.seeds = 0;
            state.autoClickers = 0;
            state.autoClickLevel = 1;
            state.clickMultiplier = 1 + state.prestigeLevel * 0.1;
            state.clickBonus = 0;
            state.growth = 0;
            state.daySkipCount = 0;
            updateUI();
            checkAchievements();
            saveGame();
            alert(`✨ Перерождение! Бонус: x${state.prestigeBonus.toFixed(1)}`);
        }

        function checkAchievements() {
            ACHIEVEMENTS.forEach(a => {
                if (!state.achievements.includes(a.id) && a.check()) {
                    state.achievements.push(a.id);
                    setTimeout(() => alert(`🏆 ${a.name}!\n${a.desc}`), 300);
                }
            });
        }

        // ---- ОБНОВЛЕНИЕ UI ----
        function updateUI() {
            document.getElementById('money').textContent = Math.floor(state.money);
            document.getElementById('seeds').textContent = state.seeds;
            const cps = state.autoClickers * 0.5 * state.autoClickLevel * state.prestigeBonus;
            document.getElementById('cps').textContent = cps.toFixed(1);
            document.getElementById('growth').textContent = Math.floor(state.growth) + '%';

            const shop = document.getElementById('shopContainer');
            shop.innerHTML = '';
            ALL_SEEDS.forEach(seed => {
                const price = getSeedPrice(seed.id);
                const owned = state.seedInventory[seed.id] === 1;
                const btn = document.createElement('button');
                btn.className = 'shop-btn' + (owned ? ' bought' : '') + (state.money < price || owned ? ' disabled' : '');
                btn.innerHTML = `${seed.emoji} ${seed.name}
                    <span class="price">💰 ${price}</span>
                    <span class="bonus">+${seed.bonus}💰</span>
                    <span class="owned">${owned ? '✅ Куплено' : ''}</span>`;
                btn.onclick = () => buySeed(seed.id);
                shop.appendChild(btn);
            });

            document.getElementById('prestigeBtn').textContent = `✨ Перерождение (${Math.floor(1000 * Math.pow(2, state.prestigeLevel))}💰)`;

            const list = document.getElementById('seedList');
            list.innerHTML = '';
            ALL_SEEDS.forEach(seed => {
                const owned = state.seedInventory[seed.id] === 1;
                if (owned || seed.tier <= 3) {
                    const div = document.createElement('div');
                    div.className = 'seed-item';
                    div.innerHTML = `<span class="sname">${seed.emoji} ${seed.name}</span>
                        <span class="sprice">💰 ${getSeedPrice(seed.id)}</span>
                        <span class="sbonus">${owned ? '✅' : '+' + seed.bonus + '💰'}</span>`;
                    list.appendChild(div);
                }
            });

            document.getElementById('achievementDisplay').textContent = `🏅 Достижения: ${state.achievements.length}/${ACHIEVEMENTS.length}`;
            saveGame();
        }

        // ---- ВКЛАДКИ ----
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                if (this.id === 'minigameBtn') {
                    startMinigame();
                    return;
                }
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                document.getElementById('tab-' + this.dataset.tab).classList.add('active');
            });
        });

        // ---- СОХРАНЕНИЕ ----
        function saveGame() {
            try { localStorage.setItem('gardenClickerSave', JSON.stringify(state)); } catch(e) {}
        }
        function loadGame() {
            try {
                const data = localStorage.getItem('gardenClickerSave');
                if (data) { state = { ...state, ...JSON.parse(data) }; return true; }
            } catch(e) {}
            return false;
        }

        function gameTick() {
            const cps = state.autoClickers * 0.5 * state.autoClickLevel * state.prestigeBonus;
            if (cps > 0) {
                state.money += cps / 10;
                state.totalMoneyEarned += cps / 10;
                updateUI();
                checkAchievements();
            }
        }

        // ============================================================
        //  МИНИ-ИГРА: УБЕГИ ОТ COOL KID
        // ============================================================
        let minigameRunning = false;
        let minigameTimer = 120;
        let minigameInterval = null;
        let mgPlayer = { x: 0, y: 0 };
        let mgEnemy = { x: 0, y: 0 };
        const MG_SIZE = 35;
        let mgCanvas, mgCtx, mgWidth, mgHeight;
        let mgTouchId = null;

        function startMinigame() {
            const overlay = document.getElementById('minigameOverlay');
            overlay.classList.add('active');
            document.getElementById('minigameResult').textContent = '';
            minigameTimer = 120;
            minigameRunning = true;
            updateMinigameTimer();

            mgCanvas = document.getElementById('minigameCanvas');
            const rect = mgCanvas.parentElement.getBoundingClientRect();
            mgCanvas.width = rect.width;
            mgCanvas.height = rect.height;
            mgCtx = mgCanvas.getContext('2d');
            mgWidth = mgCanvas.width;
            mgHeight = mgCanvas.height;

            mgPlayer = { x: mgWidth/2, y: mgHeight/2 };
            mgEnemy = { x: 50, y: 50 };

            if (minigameInterval) clearInterval(minigameInterval);
            minigameInterval = setInterval(() => {
                minigameTimer--;
                updateMinigameTimer();
                if (minigameTimer <= 0) {
                    endMinigame(true);
                }
            }, 1000);

            mgCanvas.addEventListener('touchstart', mgTouchStart, { passive: false });
            mgCanvas.addEventListener('touchmove', mgTouchMove, { passive: false });
            mgCanvas.addEventListener('touchend', mgTouchEnd, { passive: false });
            mgCanvas.addEventListener('mousemove', mgMouseMove);

            requestAnimationFrame(gameLoop);
        }

        function updateMinigameTimer() {
            const mins = Math.floor(minigameTimer / 60);
            const secs = minigameTimer % 60;
            document.getElementById('minigameTimer').textContent = `⏱️ ${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function mgTouchStart(e) {
            e.preventDefault();
            const touch = e.touches[0];
            if (!touch) return;
            mgTouchId = touch.identifier;
            const rect = mgCanvas.getBoundingClientRect();
            mgPlayer.x = (touch.clientX - rect.left) * (mgWidth / rect.width);
            mgPlayer.y = (touch.clientY - rect.top) * (mgHeight / rect.height);
        }

        function mgTouchMove(e) {
            e.preventDefault();
            const touch = Array.from(e.touches).find(t => t.identifier === mgTouchId);
            if (!touch) return;
            const rect = mgCanvas.getBoundingClientRect();
            mgPlayer.x = (touch.clientX - rect.left) * (mgWidth / rect.width);
            mgPlayer.y = (touch.clientY - rect.top) * (mgHeight / rect.height);
        }

        function mgTouchEnd(e) { mgTouchId = null; }

        function mgMouseMove(e) {
            const rect = mgCanvas.getBoundingClientRect();
            mgPlayer.x = (e.clientX - rect.left) * (mgWidth / rect.width);
            mgPlayer.y = (e.clientY - rect.top) * (mgHeight / rect.height);
        }

        function gameLoop() {
            if (!minigameRunning) return;
            updateEnemy();
            drawGame();
            checkCollision();
            requestAnimationFrame(gameLoop);
        }

        function updateEnemy() {
            const dx = mgPlayer.x - mgEnemy.x;
            const dy = mgPlayer.y - mgEnemy.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist > 1) {
                const speed = 1.2 + (120 - minigameTimer) / 150;
                mgEnemy.x += (dx / dist) * Math.min(speed, 3);
                mgEnemy.y += (dy / dist) * Math.min(speed, 3);
            }
            mgEnemy.x = Math.max(MG_SIZE/2, Math.min(mgWidth - MG_SIZE/2, mgEnemy.x));
            mgEnemy.y = Math.max(MG_SIZE/2, Math.min(mgHeight - MG_SIZE/2, mgEnemy.y));
        }

        function drawGame() {
            mgCtx.clearRect(0, 0, mgWidth, mgHeight);
            mgCtx.fillStyle = '#1a1a2e';
            mgCtx.fillRect(0, 0, mgWidth, mgHeight);
            for (let i = 0; i < mgWidth; i += 40) {
                for (let j = 0; j < mgHeight; j += 40) {
                    mgCtx.fillStyle = (i/40 + j/40) % 2 === 0 ? '#222244' : '#1a1a36';
                    mgCtx.fillRect(i, j, 40, 40);
                }
            }

            // Игрок — фермер
            mgCtx.shadowColor = '#4a9a4a';
            mgCtx.shadowBlur = 20;
            mgCtx.fillStyle = '#6ab04a';
            mgCtx.beginPath();
            mgCtx.arc(mgPlayer.x, mgPlayer.y, MG_SIZE/2, 0, Math.PI*2);
            mgCtx.fill();
            mgCtx.shadowBlur = 0;
            mgCtx.font = '20px sans-serif';
            mgCtx.textAlign = 'center';
            mgCtx.textBaseline = 'middle';
            mgCtx.fillStyle = '#fff';
            mgCtx.fillText('🧑‍🌾', mgPlayer.x, mgPlayer.y);

            // Враг — Cool Kid (красный)
            mgCtx.shadowColor = '#ff4444';
            mgCtx.shadowBlur = 30;
            mgCtx.fillStyle = '#cc2222';
            mgCtx.beginPath();
            mgCtx.arc(mgEnemy.x, mgEnemy.y, MG_SIZE/2, 0, Math.PI*2);
            mgCtx.fill();
            mgCtx.shadowBlur = 0;
            mgCtx.font = '20px sans-serif';
            mgCtx.textAlign = 'center';
            mgCtx.textBaseline = 'middle';
            mgCtx.fillStyle = '#fff';
            mgCtx.fillText('😎', mgEnemy.x, mgEnemy.y);

            // Метка "COOL KID"
            mgCtx.font = '10px sans-serif';
            mgCtx.fillStyle = '#ff6666';
            mgCtx.fillText('COOL KID', mgEnemy.x, mgEnemy.y - MG_SIZE/2 - 10);
        }

        function checkCollision() {
            const dx = mgPlayer.x - mgEnemy.x;
            const dy = mgPlayer.y - mgEnemy.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < MG_SIZE) {
                endMinigame(false);
            }
        }

        function endMinigame(win) {
            if (!minigameRunning) return;
            minigameRunning = false;
            if (minigameInterval) clearInterval(minigameInterval);
            document.getElementById('minigameTimer').textContent = win ? '🎉 ПОБЕДА!' : '💀 ТЕБЯ ПОЙМАЛИ!';
            const result = document.getElementById('minigameResult');
            if (win) {
                const reward = 5 + state.prestigeLevel * 2;
                state.money += reward;
                state.totalMoneyEarned += reward;
                state.minigameWins++;
                result.textContent = `🏆 +${reward}💰 за победу!`;
                result.style.color = '#ffd700';
            } else {
                result.textContent = '😵 Попробуй ещё раз!';
                result.style.color = '#ff6b6b';
            }
            updateUI();
            checkAchievements();
            saveGame();
        }

        // ---- ЗАКРЫТИЕ МИНИ-ИГРЫ ----
        document.getElementById('minigameClose').addEventListener('click', () => {
            if (minigameInterval) clearInterval(minigameInterval);
            minigameRunning = false;
            document.getElementById('minigameOverlay').classList.remove('active');
        });

        // ============================================================
        //  ИНИЦИАЛИЗАЦИЯ
        // ============================================================

        loadGame();
        updateUI();

        document.getElementById('clickBtn').addEventListener('click', clickHandler);
        document.getElementById('clickBtn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            clickHandler(e.touches[0]);
        });

        document.getElementById('autoClickBtn').addEventListener('click', () => {
            const price = Math.floor(50 * Math.pow(1.5, state.autoClickers));
            if (state.money >= price) {
                state.money -= price;
                state.autoClickers++;
                updateUI();
                saveGame();
            } else {
                alert(`Нужно ${price}💰`);
            }
        });

        document.getElementById('prestigeBtn').addEventListener('click', doPrestige);
        document.getElementById('resetBtn').addEventListener('click', () => {
            if (confirm('Сбросить весь прогресс?')) {
                localStorage.removeItem('gardenClickerSave');
                location.reload();
            }
        });

        document.getElementById('skipDayBtn').addEventListener('click', skipDay);

        // Действия
        document.getElementById('waterBtn').addEventListener('click', () => doAction('Полив', 1, 0));
        document.getElementById('fertilizeBtn').addEventListener('click', () => doAction('Удобрение', 2, 0));
        document.getElementById('harvestBtn').addEventListener('click', () => doAction('Сбор урожая', 1.5, 0));
        document.getElementById('plantBtn').addEventListener('click', () => doAction('Посадка', 1, 0));

        setInterval(() => saveGame(), 15000);
        setInterval(gameTick, 100);

        console.log('🌱 Сад-Кликер обновлён! 80 семян (1 раз), Cool Kid, скин фермера, пропуск дня, действия.');
    </script>
</body>
</html>
